<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新概念英语第二册 · 96课</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Serif+Display&family=Noto+Sans+SC:wght@300;400;500;600&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: oklch(97% 0.004 85);
  --surface: oklch(99% 0.002 85);
  --surface-alt: oklch(94% 0.006 85);
  --text: oklch(22% 0.01 85);
  --text-muted: oklch(45% 0.008 80);
  --text-faint: oklch(60% 0.006 80);
  --accent: oklch(55% 0.12 155);
  --accent-warm: oklch(58% 0.14 65);
  --accent-subtle: oklch(55% 0.12 155 / 0.12);
  --border: oklch(88% 0.008 85);
  --shadow-sm: 0 1px 2px oklch(0% 0 0 / 0.04);
  --shadow-md: 0 4px 16px oklch(0% 0 0 / 0.06);
  --radius: 10px;
  --sidebar-w: 300px;
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg: oklch(16% 0.008 85);
    --surface: oklch(20% 0.006 85);
    --surface-alt: oklch(24% 0.01 85);
    --text: oklch(88% 0.008 85);
    --text-muted: oklch(65% 0.006 80);
    --text-faint: oklch(50% 0.005 80);
    --border: oklch(28% 0.01 85);
    --shadow-sm: 0 1px 2px oklch(0% 0 0 / 0.2);
    --shadow-md: 0 4px 16px oklch(0% 0 0 / 0.25);
    --accent-subtle: oklch(55% 0.12 155 / 0.18);
  }
}
[data-theme="dark"] {
  --bg: oklch(16% 0.008 85);
  --surface: oklch(20% 0.006 85);
  --surface-alt: oklch(24% 0.01 85);
  --text: oklch(88% 0.008 85);
  --text-muted: oklch(65% 0.006 80);
  --text-faint: oklch(50% 0.005 80);
  --border: oklch(28% 0.01 85);
  --shadow-sm: 0 1px 2px oklch(0% 0 0 / 0.2);
  --shadow-md: 0 4px 16px oklch(0% 0 0 / 0.25);
  --accent-subtle: oklch(55% 0.12 155 / 0.18);
}
[data-theme="light"] {
  --bg: oklch(97% 0.004 85);
  --surface: oklch(99% 0.002 85);
  --surface-alt: oklch(94% 0.006 85);
  --text: oklch(22% 0.01 85);
  --text-muted: oklch(45% 0.008 80);
  --text-faint: oklch(60% 0.006 80);
  --accent: oklch(55% 0.12 155);
  --accent-warm: oklch(58% 0.14 65);
  --accent-subtle: oklch(55% 0.12 155 / 0.12);
  --border: oklch(88% 0.008 85);
  --shadow-sm: 0 1px 2px oklch(0% 0 0 / 0.04);
  --shadow-md: 0 4px 16px oklch(0% 0 0 / 0.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:17px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{
  font-family:'Cormorant Garamond','Georgia','Times New Roman',serif;
  background:var(--bg);color:var(--text);line-height:1.7;
  min-height:100vh;display:flex;
}
::selection{background:var(--accent-subtle);color:var(--text)}

.sidebar{
  width:var(--sidebar-w);flex-shrink:0;position:sticky;top:0;height:100vh;
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:10;overflow:hidden;
}
.sidebar-header{
  padding:1.6rem 1.4rem 1rem;
  border-bottom:1px solid var(--border);
}
.sidebar-header h2{
  font-family:'DM Serif Display','Noto Serif SC',serif;
  font-size:1.25rem;font-weight:400;color:var(--text);
  letter-spacing:0.02em;margin-bottom:0.2rem;
}
.sidebar-header .sub{
  font-family:'Noto Sans SC',sans-serif;font-size:0.72rem;
  color:var(--text-faint);text-transform:uppercase;letter-spacing:0.08em;
}
.sidebar-search{
  padding:0.8rem 1.4rem;
  border-bottom:1px solid var(--border);
}
.sidebar-search input{
  width:100%;padding:0.6rem 0.9rem;
  border:1px solid var(--border);border-radius:8px;
  background:var(--bg);color:var(--text);
  font-family:'Noto Sans SC',sans-serif;font-size:0.82rem;
  outline:none;transition:all 0.2s var(--ease-out);
}
.sidebar-search input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-subtle);
}
.sidebar-search input::placeholder{color:var(--text-faint)}
.sidebar-nav{
  flex:1;overflow-y:auto;padding:0.5rem 0.6rem;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
.sidebar-nav::-webkit-scrollbar{width:4px}
.sidebar-nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.nav-item{
  display:flex;align-items:center;gap:0.7rem;
  padding:0.5rem 0.8rem;margin-bottom:2px;
  border-radius:8px;cursor:pointer;
  font-family:'Noto Sans SC',sans-serif;font-size:0.8rem;
  color:var(--text-muted);transition:all 0.15s var(--ease-out);
  position:relative;user-select:none;
}
.nav-item:hover{background:var(--surface-alt);color:var(--text)}
.nav-item.active{background:var(--accent-subtle);color:var(--accent);font-weight:500}
.nav-item .num{
  font-family:'DM Serif Display',serif;font-size:0.85rem;
  width:2em;text-align:right;flex-shrink:0;
  color:var(--text-faint);font-weight:400;
}
.nav-item.active .num{color:var(--accent)}
.nav-item .ttl{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-item .dot{
  width:6px;height:6px;border-radius:50%;flex-shrink:0;
  background:transparent;transition:background 0.2s;
}
.nav-item.visited .dot{background:var(--accent-warm)}

.sidebar-footer{
  padding:0.8rem 1.4rem;border-top:1px solid var(--border);
}
.progress-label{
  font-family:'Noto Sans SC',sans-serif;font-size:0.7rem;
  color:var(--text-faint);text-transform:uppercase;
  letter-spacing:0.06em;margin-bottom:0.4rem;
  display:flex;justify-content:space-between;
}
.progress-bar{
  height:3px;background:var(--border);border-radius:2px;overflow:hidden;
}
.progress-fill{
  height:100%;background:var(--accent);border-radius:2px;
  transition:width 0.4s var(--ease-out);
}

.main{
  flex:1;display:flex;flex-direction:column;
  min-width:0;overflow-y:auto;
}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem 2rem;position:sticky;top:0;z-index:5;
  background:var(--bg);border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.topbar .lesson-meta{
  display:flex;align-items:baseline;gap:0.5rem;
  font-family:'Noto Sans SC',sans-serif;
}
.topbar .lesson-num{
  font-family:'DM Serif Display',serif;
  font-size:1.4rem;color:var(--accent);font-weight:400;
}
.topbar .lesson-title-en{
  font-family:'Cormorant Garamond',serif;
  font-size:1.2rem;font-style:italic;color:var(--text);
}
.topbar .lesson-title-cn{
  font-size:0.85rem;color:var(--text-muted);margin-left:0.3rem;
}
.topbar .topbar-stats{
  display:flex;gap:1.5rem;font-family:'Noto Sans SC',sans-serif;
  font-size:0.75rem;color:var(--text-faint);
  align-items:center;
}
.topbar .topbar-stat span{color:var(--text-muted);font-weight:500}
.theme-toggle{
  background:none;border:none;cursor:pointer;
  color:var(--text-muted);font-size:0.8rem;padding:0.3rem 0.6rem;
  border-radius:6px;transition:all 0.2s var(--ease-out);
  display:flex;align-items:center;gap:0.3rem;
}
.theme-toggle:hover{color:var(--text);background:var(--surface-alt)}
.theme-toggle svg{width:0.9rem;height:0.9rem;fill:currentColor}
.theme-toggle .sun{display:none}
.theme-toggle .moon{display:inline}
[data-theme="dark"] .theme-toggle .sun{display:inline}
[data-theme="dark"] .theme-toggle .moon{display:none}

.content-area{
  max-width:800px;width:100%;margin:0 auto;
  padding:2rem 2rem 3rem;
}
.english-block,.chinese-block{
  padding:1.8rem 0;
}
.english-block{
  border-bottom:1px solid var(--border);
}
.english-block h3,.chinese-block h3{
  font-family:'DM Serif Display','Noto Serif SC',serif;
  font-size:0.85rem;font-weight:400;color:var(--text-faint);
  letter-spacing:0.06em;text-transform:uppercase;
  margin-bottom:1.2rem;
}
.english-text{
  font-family:'Cormorant Garamond','Georgia',serif;
  font-size:1.5rem;line-height:1.85;color:var(--text);
  white-space:pre-line;font-weight:600;
}

.english-title-inline{
  font-family:'DM Serif Display',serif;
  font-size:1.6rem;font-weight:400;color:var(--text);
  letter-spacing:0.01em;margin-bottom:1rem;
  line-height:1.3;
}
.chinese-text{
  font-family:'Noto Serif SC','STSong','SimSun',serif;
  font-size:1rem;line-height:1.9;color:var(--text-muted);
  white-space:pre-line;font-weight:400;
}

/* VOCAB WORD */
.vocab{
  display:inline;position:relative;
  color:var(--accent-warm);font-weight:600;
  border-bottom:1.5px dashed oklch(58% 0.14 65 / 0.45);
  cursor:help;transition:all 0.15s;
}
.vocab:hover{color:oklch(58% 0.16 50);border-bottom-color:oklch(58% 0.16 50 / 0.8)}

/* TOOLTIP - rendered externally via JS, not nested in vocab */
.tooltip-global{
  position:fixed;pointer-events:none;z-index:9999;
  background:var(--text);color:var(--bg);
  padding:0.4rem 0.7rem;border-radius:6px;
  font-family:'Noto Sans SC',sans-serif;font-size:0.76rem;
  font-weight:400;line-height:1.45;
  white-space:nowrap;
  box-shadow:0 4px 20px oklch(0% 0 0 / 0.18);
  opacity:0;visibility:hidden;
  transition:opacity 0.15s var(--ease-out),visibility 0.15s;
}
.tooltip-global::after{
  content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);
  border:5px solid transparent;border-top-color:var(--text);
}
.tooltip-global.below::after{
  top:auto;bottom:100%;border-top-color:transparent;border-bottom-color:var(--text);
}
.tooltip-global.show{opacity:1;visibility:visible}

.bottom-nav{
  display:flex;justify-content:space-between;
  max-width:800px;margin:0 auto;padding:0 2rem 2.5rem;width:100%;
}
.nav-btn{
  display:flex;align-items:center;gap:0.5rem;
  padding:0.7rem 1.4rem;
  border:1px solid var(--border);border-radius:50px;
  background:var(--surface);color:var(--text);
  font-family:'Noto Sans SC',sans-serif;font-size:0.82rem;
  cursor:pointer;transition:all 0.2s var(--ease-out);
  user-select:none;
}
.nav-btn:hover{background:var(--surface-alt);border-color:var(--accent);color:var(--accent)}
.nav-btn:disabled{opacity:0.35;cursor:not-allowed}
.nav-btn .arrow{font-size:1rem;line-height:1}
.nav-btn .hint{font-size:0.68rem;color:var(--text-faint)}

.empty-state{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:6rem 2rem;text-align:center;
}
.empty-state .icon{
  font-size:3.5rem;margin-bottom:1.5rem;opacity:0.5;
  font-family:'DM Serif Display',serif;color:var(--text-faint);
}
.empty-state p{
  font-family:'Noto Sans SC',sans-serif;font-size:0.9rem;color:var(--text-muted);
  max-width:260px;
}

@media (max-width:768px){
  body{flex-direction:column}
  .sidebar{width:100%;height:auto;position:relative;max-height:40vh}
  .sidebar-nav{max-height:25vh}
  .topbar{padding:0.8rem 1.2rem}
  .topbar .lesson-meta{flex-wrap:wrap}
  .content-area{padding:1.5rem 1.2rem}
  .bottom-nav{padding:0 1.2rem 2rem}
  .english-text{font-size:1.3rem}
  .chinese-text{font-size:0.95rem}
}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}
}
</style>
</head>

<script>
const lessons = [{"id": 1, "title_en": "A private conversation", "title_cn": "私人谈话", "english": "L\n\nast week I went to the theatre. I had a very good seat. The play was very interesting. I did not enjoy it. A young man and a young woman were sitting behind me. They were talking loudly. I got very angry. I could not hear the actors. I turned round. I looked at the man and the woman angrily. They did not pay any attention. In the end, I could not bear it. I turned round again. 'I can't hear a word!' I said angrily.\n\n'It's none of your business,' the young man said rudely. 'This is a private conversation!'", "chinese": "私人谈话\n\n上星期我去看戏。我的座位很好，戏很有意思，但我却无法欣赏。一青年男子与一青年女子坐在我的身后，大声地说着话。我非常生气，因为我听不见演员在说什么。我回过头去怒视着那一男一女，他们却毫不理会。最后，我忍不住了，又一次回过头去，生气地说：“我一个字也听不见了！”。\n\n“不关你的事，”那男的毫不客气地说，“这是私人间的谈话！”", "vocabulary": {"private": "adj. 私人的", "conversation": "n. 谈话", "theatre": "n. 剧场，戏院", "seat": "n. 座位", "play": "n. 戏", "loudly": "adv. 大声地", "angry": "adj. 生气的", "angrily": "adv. 生气地", "attention": "n. 注意", "bear": "v. 容忍", "business": "n. 事", "rudely": "adv. 无礼地，粗鲁地"}}, {"id": 2, "title_en": "Breakfast or lunch?", "title_cn": "早餐还是午餐？", "english": "I\n\nt was Sunday. I never get up early on Sundays. I sometimes stay in bed until lunchtime. Last Sunday I got up very late. I looked out of the window. It was dark outside. 'What a day!' I thought. 'It's raining again.' Just then, the telephone rang. It was my aunt Lucy. 'I've just arrived by train,' she said. 'I'm coming to see you.'\n\n'But I'm still having breakfast,' I said.\n\n'What are you doing?' she asked.\n\n'I'm having breakfast,' I repeated.\n\n'Dear me,' she said. 'Do you always get up so late? It's one o'clock!'", "chinese": "早餐还是午餐？\n\n那是个星期天，而在星期天我是从来不早起的，有时我要一直躺到吃午饭的时候。上个星期天，我起得很晚。我望望窗外，外面一片昏暗。“鬼天气！”我想，“又下雨了。”正在这时，电话铃响了。是我姑母露西打来的。“我刚下火车，”她说，“我这就来看你。”\n\n“但我还在吃早饭，”我说。\n\n“你在干什么？”她问道。\n\n“我正在吃早饭，”我又说了一遍。\n\n“天啊，”她说，“你总是起得这么晚吗？现在已经1点钟了！”", "vocabulary": {"until": "prep. 直到", "outside": "adv. 外面", "ring": "v. (铃、电话等)响", "aunt": "n. 姑，姨，婶，舅妈", "repeat": "v. 重复"}}, {"id": 3, "title_en": "Please send me a card", "title_cn": "请给我寄一张明信片", "english": "P\n\nostcards always spoil my holidays. Last summer, I went to Italy. I visited museums and sat in public gardens. A friendly waiter taught me a few words of Italian. Then he lent me a book. I read a few lines, but I did not understand a word. Everyday I thought about postcards. My holidays passed quickly, but I did not send cards to my friends. On the last day I made a big decision. I got up early and bought thirty-seven cards. I spent the whole day in my room, but I did not write a single card!\n\n版本差异: 旧版做I did not send any cards to my friends.意思上更为合理。", "chinese": "请给我寄一张明信片\n\n明信片总搅得我假日不得安宁。去年夏天，我去了意大利。我参观了博物馆，还去了公园。一位好客的服务员教了我几句意大利语，之后还借给我一本书。我读了几行，但一个字也不懂。我每天都想着明信片的事。假期过得真快，可我还没有给我的朋友们寄过一张明信片。到了最后一天，我作出了一项重大决定。我早早起了床，买来了37张明信片。我在房间里关了整整一天。然而竟连一张明信片也没写成！", "vocabulary": {"send": "v. 寄，送", "postcard": "n. 明信片", "spoil": "v. 使索然无味，损坏", "museum": "n. 博物馆", "public": "adj. 公共的", "friendly": "adj. 友好的", "waiter": "n. 服务员，招待员", "lend": "v. 借给", "decision": "n. 决定", "whole": "adj. 整个的", "single": "adj. 唯一的，单一的"}}, {"id": 4, "title_en": "An exciting trip", "title_cn": "激动人心的旅行", "english": "I\n\n have just received a letter from my brother, Tim. He is in Australia. He has been there for six months. Tim is an engineer. He is working for a big firm and he has already visited a great number of different places in Australia. He has just bought an Australian car and has gone to Alice Springs, a small town in the centre of Australia. He will soon visit Darwin. From there, he will fly to Perth. My brother has never been abroad before, so he is finding this trip very exciting.", "chinese": "激动人心的旅行\n\n我刚刚收到弟弟蒂姆的来信，他正在澳大利亚。他在那儿已经住了6个月了。蒂姆是个工程师，正在为一家大公司工作，并且已经去过澳大利亚的不少地方了。他刚买了一辆澳大利亚小汽车，现在去了澳大利亚中部的小镇艾利斯斯普林斯。他不久还将到达尔文去，从那里，他再飞往珀斯。我弟弟以前从未出过国，因此，他觉得这次旅行非常激动人心。", "vocabulary": {"exciting": "adj. 令人兴奋的", "receive": "v. 接受，收到", "firm": "n. 商行，公司", "different": "adj. 不同的", "centre": "n. 中心", "abroad": "adv. 在国外"}}, {"id": 5, "title_en": "No wrong numbers", "title_cn": "无错号之虞", "english": "M\n\nr James Scott has a garage in Silbury and now he has just bought another garage in Pinhurst. Pinhurst is only five miles from Silbury, but Mr Scott cannot get a telephone for his new garage, so he has just bought twelve pigeons. Yesterday, a pigeon carried the first message from Pinhurst to Silbury. The bird covered the distance in three minutes. Up to now, Mr Scott has sent a great many requests for spare parts and other urgent messages from one garage to the other. In this way, he has begun his own private 'telephone' service.", "chinese": "无错号之虞\n\n詹姆斯·斯科特先生在锡尔伯里有一个汽车修理部，现在他刚在平赫斯特买了另一个汽车修理部。平赫斯特离锡尔伯里只有5英里，但詹姆斯·斯科特先生未能为他新的汽车修理部搞到一部电话机，所以他买了12只鸽子。昨天，一只鸽子把第一封信从平赫斯特带到锡尔伯里。这只鸟只用了3分钟就飞完了全程。到目前为止，斯科特先生从一个汽车修理部向另一个发送了大量索取备件的信件和其他紧急函件。就这样，他开始了自己的私人“电话”业务。", "vocabulary": {"pigeon": "n. 鸽子", "message": "n. 信息", "over": "v. 越过", "distance": "n. 距离", "request": "n. 要求，请求", "service": "n. 业务，服务"}}, {"id": 6, "title_en": "Percy Buttons", "title_cn": "珀西·巴顿斯", "english": "I\n\n have just moved to a house in Bridge Street. Yesterday a beggar knocked at my door. He asked me for a meal and a glass of beer. In return for this, the beggar stood on his head and sang songs. I gave him a meal. He ate the food and drank the beer. Then he put a piece of cheese in his pocket and went away. Later a neighbour told me about him. Everybody knows him. His name is Percy Buttons. He calls at every house in the street once a month and always asks for a meal and a glass of beer.", "chinese": "珀西·巴顿斯\n\n我刚刚搬进了大桥街的一所房子。昨天一个乞丐来敲我的门，问我要一顿饭和一杯啤酒。作为回报，那乞丐头顶地倒立起来，嘴里还唱着歌。我给了他一顿饭。他把食物吃完，又喝了酒。然后把一块乳酪装进衣袋里走了。后来，一位邻居告诉了我他的情况。大家都认识他，他叫珀西·巴顿斯。他每月对这条街上的每户人家光顾一次，总是请求给他一顿饭和一杯啤酒。", "vocabulary": {"beggar": "n. 乞丐", "food": "n. 食物", "pocket": "n. 衣服口袋", "call": "v. 拜访，光顾"}}, {"id": 7, "title_en": "Too late", "title_cn": "为时太晚", "english": "T\n\nhe plane was late and detectives were waiting at the airport all morning. They were expecting a valuable parcel of diamonds from South Africa. A few hours earlier, someone had told the police that thieves would try to steal the diamonds. When the plane arrived, some of the detectives were waiting inside the main building while others were waiting on the airfield. Two men took the parcel off the plane and carried it into the Customs House. While two detectives were keeping guard at the door, two others opened the parcel. To their surprise, the precious parcel was full of stones and sand!", "chinese": "为时太晚\n\n飞机误点了，侦探们在机场等了整整一上午。他们正期待从南非来的一个装着钻石的贵重包裹。数小时以前，有人向警方报告，说有人企图偷走这些钻石。当飞机到达时，一些侦探等候在主楼内，另一些侦探则守候在停机坪上。有两个人把包裹拿下飞机，进了海关。这时两个侦探把住门口，另外两个侦探打开了包裹。令他们吃惊的是，那珍贵的包裹里面装的全是石头和沙子！", "vocabulary": {"detective": "n. 侦探", "airport": "n. 机场", "expect": "v. 期待，等待", "valuable": "adj. 贵重的", "parcel": "n. 包裹", "diamond": "n. 钻石", "steal": "v. 偷", "main": "adj. 主要的", "airfield": "n. 飞机起落的场地", "guard": "n. 警戒，守卫", "precious": "adj. 珍贵的", "stone": "n. 石子", "sand": "n. 沙子"}}, {"id": 8, "title_en": "The best and the worst", "title_cn": "最好的和最差的", "english": "J\n\noe Sanders has the most beautiful garden in our town. Nearly everybody enters for 'The Nicest Garden Competition' each year, but Joe wins every time. Bill Frith's garden is larger than Joe's. Bill works harder than Joe and grows more flowers and vegetables, but Joe's garden is more interesting. He has made neat paths and has built a wooden bridge over a pool. I like gardens too, but I do not like hard work. Every year I enter for the garden competition too, and I always win a little prize for the worst garden in the town!", "chinese": "最好的和最差的\n\n乔·桑德斯拥有我们镇上最漂亮的花园。几乎每个人都参加每年举办的“最佳花园竞赛”，而每次都是乔获胜。\n\n比尔·弗里斯的花园比乔的花园大，他比乔也更为勤奋，种植的花卉和蔬菜也更多，但乔的花园更富有情趣。他修筑了一条条整洁的小路，并在一个池塘上架了一座小木桥。\n\n我也喜欢花园，但我却不愿意辛勤劳动。每年的花园竞赛我也参加，但总因是镇上最劣的花园而获得一个小奖！", "vocabulary": {"competition": "n. 比赛,竞赛", "neat": "adj. 整齐的，整洁的", "path": "n. 小路，小径", "wooden": "adj. 木头的", "pool": "n. 水池"}}, {"id": 9, "title_en": "A cold welcome", "title_cn": "冷遇", "english": "O\n\nn Wednesday evening, we went to the Town Hall. It was the last day of the year and a large crowd of people had gathered under the Town Hall clock. It would strike twelve in twenty minutes' time. Fifteen minutes passed and then, at five to twelve, the clock stopped. The big minute hand did not move. We waited and waited, but nothing happened. Suddenly someone shouted, 'It's two minutes past twelve! The clock has stopped!' I looked at my watch. It was true. The big clock refused to welcome the New Year. At that moment, everybody began to laugh and sing.", "chinese": "冷遇\n\n星期三的晚上，我们去了市政厅。那是一年的最后一天，一大群人聚集在市政厅的大钟下面。再过20分钟，大钟将敲响12下。\n\n15分钟过去了，而就在11点55分时，大钟停了。那根巨大的分针不动了。我们等啊等啊，可情况没有变化。\n\n突然有人喊道：“已经12点零2分了！那钟已经停了！”我看了一下我的手表，果真如此。那座大钟不愿意迎接新年。此时，大家已经笑了起来，同时唱起了歌。", "vocabulary": {"welcome": "v. 欢迎", "crowd": "n. 人群", "gather": "v. 聚集", "hand": "n. (表或机器的)指针", "shout": "v. 喊叫", "refuse": "v. 拒绝", "laugh": "v. 笑"}}, {"id": 10, "title_en": "Not for jazz", "title_cn": "不适于演奏爵士乐", "english": "W\n\ne have an old musical instrument. It is called a clavichord. It was made in Germany in 1681. Our clavichord is kept in the living room. It has belonged to our family for a long time. The instrument was bought by my grandfather many years ago. Recently it was damaged by a visitor. She tried to play jazz on it! She struck the keys too hard and two of the strings were broken. My father was shocked. Now we are not allowed to touch it. It is being repaired by a friend of my father's.", "chinese": "不适于演奏爵士乐\n\n我们有一件古老的乐器，叫击弦古钢琴。它是1681年德国制造的，我们这架钢琴放在客厅里。我们家拥有它很长时间了，这件乐器是许多年前我祖父买来的。最近它被一位客人弄坏了，她用它弹奏爵士乐！她按键太猛，把两根弦按断了。我父亲为之震怒。现在他不允许我们再碰它。父亲的一位朋友正在修理这件古老的乐器。", "vocabulary": {"jazz": "n. 爵士音乐", "musical": "adj. 音乐的", "instrument": "n. 乐器", "clavichord": "n. 古钢琴", "recently": "adv. 最近", "damage": "v. 损坏", "key": "n. 琴键", "string": "n. (乐器的)弦", "shock": "v. 使不悦或生气，震惊", "allow": "v. 允许，让", "touch": "v. 触摸"}}, {"id": 11, "title_en": "One good turn deserves another", "title_cn": "礼尚往来", "english": "I\n\n was having dinner at a restaurant when Tony Steele came in. Tony worked in a lawyer's office years ago, but he is now working at a bank. He gets a good salary, but he always borrows money from his friends and never pays it back. Tony saw me and came and sat at the same table. He has never borrowed money from me. While he was eating, I asked him to lend me twenty pounds. To my surprise, he gave me the money immediately. 'I have never borrowed any money from you,' Tony said, 'so now you can pay for my dinner!'\n\n版本差异: 旧版人名做 Harry, 新版改为 Tony，蛮无厘头的；金额则由 £2 通胀为twenty pounds。", "chinese": "礼尚往来\n\n我正在一家饭馆吃饭，托尼·斯蒂尔走了进来。托尼曾在一家律师事务所工作，而现在正在一家银行上班，他的薪水很高，但他却总是向朋友借钱，并且从来不还。托尼看见了我，就走过来和我坐到一张桌子前。他从未向我借过钱，但他吃饭时，我提出向他借20英镑。令我惊奇的是，他立刻把钱给了我。“我还未向你借过钱。”托尼说道，“所以现在你可以替我付饭钱了！”", "vocabulary": {"turn": "n. 行为，举止", "deserve": "v. 应得到，值得", "lawyer": "n. 律师", "bank": "n. 银行", "salary": "n. 工资", "immediately": "adv. 立刻"}}, {"id": 12, "title_en": "Goodbye and Good luck", "title_cn": "再见，一路顺风", "english": "O\n\nur neighbour, Captain Charles Alison, will sail from Portsmouth tomorrow. We'll meet him at the harbour early in the morning. He will be in his small boat, Topsail. Topsail is a famous little boat. It has sailed across the Atlantic many times. Captain Alison will set out at eight o'clock, so we'll have plenty of time. We'll see his boat and then we'll say goodbye to him. He will be away for two months. We are very proud of him. He will take part in an important race across the Atlantic.\n\n版本差异: 旧版的We shall 或者 we shall 一律改成 We'll or we'll。", "chinese": "再见，一路顺风\n\n我们的邻居查尔斯·艾利森船长明天就要从朴次茅斯启航了。明天一大早我们将在码头为他送行。他将乘坐他的“涛波赛”号小艇。“涛波赛”号是艘有名的小艇，它已经多次横渡大西洋。艾利森船长将于8点钟启航，因此我们有充裕的时间。我们将参观他的船，然后和他告别。他要离开两个月，我们真为他感到自豪，他将参加一次重大的横渡大西洋的比赛。", "vocabulary": {"luck": "n. 运气，幸运", "captain": "n. 船长", "sail": "v. 航行", "harbour": "n. 港口", "proud": "adj. 自豪", "important": "adj. 重要的"}}, {"id": 13, "title_en": "The Greenwood Boys", "title_cn": "绿林少年", "english": "T\n\nhe Greenwood Boys are a group of popular singers. At present, they are visiting all parts of the country. They will be arriving here tomorrow. They will be coming by train and most of the young people in the town will be meeting them at the station. Tomorrow evening they will be singing at the Workers' Club. The Greenwood Boys will be staying for five days. During this time, they will give five performances. As usual, the police will have a difficult time. They will be trying to keep order. It is always the same on these occasions.\n\n版本差异: 旧版的popular singers改成 pop singers。", "chinese": "绿林少年\n\n“绿林少年”是一个流行歌曲演唱团。目前他们正在全国各地巡回演出，明天就要到达此地。他们将乘火车来，镇上的大部分青年人将到车站迎接他们。明晚他们将在工人俱乐部演出。“绿林少年”准备在此逗留5天。在此期间，他们将演出5场。同往常一样，警察的日子不好过，他们将设法维持秩序。每逢这种场合，情况都这样。", "vocabulary": {"group": "n. 小组，团体 pop singer 英 美 n. 流行歌手", "club": "n. 俱乐部", "performance": "n. 演出", "occasion": "n. 场合"}}, {"id": 14, "title_en": "Do you speak English?", "title_cn": "你会讲英语吗？", "english": "I\n\n had an amusing experience last year. After I had left a small village in the south of France, I drove on to the next town. On the way, a young man waved to me. I stopped and he asked me for a lift. As soon as he had got into the car, I said good morning to him in French and he replied in the same language. Apart from a few words, I do not know any French at all. Neither of us spoke during the journey. I had nearly reached the town, when the young man suddenly said, very slowly, 'Do you speak English?' As I soon learnt, he was English himself!", "chinese": "你会讲英语吗？\n\n去年我有过一次有趣的经历。在离开法国南部的一个小村庄后，我继续驶往下一个城镇。途中，一个青年人向我招手。我把车停下，他向我提出要求搭车。他一上车，我就用法语向他问好，他也同样用法语回答我。除了个别几个单词外，我根本不会法语。旅途中我们谁也没讲话。就要到达那个镇时，那青年突然开了口，慢慢地说道：“你会讲英语吗？”我很快了解到，他自己就是个英国人！", "vocabulary": {"amusing": "adj. 好笑的，有趣的", "experience": "n. 经历", "wave": "v. 招手", "lift": "n. 搭便车", "reply": "v. 回答", "language": "n. 语言", "journey": "n. 旅行"}}, {"id": 15, "title_en": "Good news", "title_cn": "佳音", "english": "T\n\nhe secretary told me that Mr Harmsworth would see me. I felt very nervous when I went into his office. He did not look up from his desk when I entered. After I had sat down, he said that business was very bad. He told me that the firm could not afford to pay such large salaries. Twenty people had already left. I knew that my turn had come.\n\n'Mr Harmsworth,' I said in a weak voice.\n\n'Don't interrupt,' he said.\n\nThen he smiled and told me I would receive an extra thousand pounds a year!\n\n版本差异: 金额由 £100 通胀为 thousand pounds", "chinese": "佳音\n\n秘书告诉我说哈姆斯沃斯先生要见我。我走进他的办公室，感到非常紧张。我进去的时候，他连头也没抬。待我坐下后，他说生意非常不景气。他还告诉我，公司支付不起这么庞大的工资开支，有20个人已经离去。我知道这次该轮到我了。\n\n“哈姆斯沃斯先生，”我无力地说。\n\n“不要打断我的话，”他说。\n\n然后他微笑了一下告诉我说，我每年将得到1,000英镑的额外收入。", "vocabulary": {"secretary": "n. 秘书", "nervous": "adj. 精神紧张的", "afford": "v. 负担得起", "weak": "adj. 弱的", "interrupt": "v. 插话，打断"}}, {"id": 16, "title_en": "A polite request", "title_cn": "彬彬有礼的要求", "english": "I\n\nf you park your car in the wrong place, a traffic policeman will soon find it. You will be very lucky if he lets you go without a ticket. However, this does not always happen. Traffic police are sometimes very polite. During a holiday in Sweden, I found this note on my car: 'Sir, we welcome you to our city. This is a \"No Parking\" area. You will enjoy your stay here if you pay attention to our street signs. This note is only a reminder.' If you receive a request like this, you cannot fail to obey it!", "chinese": "彬彬有礼的要求\n\n一旦你把汽车停错了地方，交通警很快就会发现。如果他没给你罚单就放你走了，算你走运。然而，情况并不都是这样，交通警有时也很客气。有一次在瑞典度假，我发现我的车上有这样一个字条：“先生，欢迎您光临我们的城市。此处是'禁止停车'区。如果您对我们街上的标牌稍加注意，您在此会过得很愉快的。谨此提请注意。”如果你收到这样的恳求，你是不会不遵照执行的！", "vocabulary": {"park": "v. 停放(汽车)", "traffic": "n. 交通", "ticket": "n. 交通法规罚款单", "note": "n. 便条", "area": "n. 地点", "sign": "n. 指示牌", "reminder": "n. 指示", "fail": "v. 无视，忘记", "obey": "v. 服从"}}, {"id": 17, "title_en": "Always young", "title_cn": "青春常驻", "english": "M\n\ny aunt Jennifer is an actress. She must be at least thirty-five years old. In spite of this, she often appears on the stage as a young girl. Jennifer will have to take part in a new play soon. This time, she will be a girl of seventeen. In the play, she must appear in a bright red dress and long black stockings. Last year in another play, she had to wear short socks and a bright, orange-coloured dress. If anyone ever asks her how old she is, she always answers, 'Darling, it must be terrible to be grown up!'\n\n版本差异: LM写的是My dear, 改成了darling,", "chinese": "青春常驻\n\n我的姑姑詹妮弗是位演员，她至少也有35岁了。尽管如此，她却常在舞台上扮演小姑娘。詹妮弗很快又要参加一个新剧的演出。这一次，她将扮演一个17岁的少女。演出时她必须穿一条鲜红色的裙子和黑色的长筒袜。去年在演另一个剧时，她不得不穿短袜和一件鲜艳的橘红色的衣服。一旦有人问起她有多大年纪，她总是回答：“亲爱的，长成大人真可怕啊！”", "vocabulary": {"appear": "v. 登场，扮演", "stage": "n. 舞台", "bright": "adj. 鲜艳的", "stocking": "n. (女用)长筒袜", "sock": "n. 短袜"}}, {"id": 18, "title_en": "He often does this!", "title_cn": "他经常干这种事！", "english": "A\n\nfter I had had lunch at a village pub, I looked for my bag. I had left it on a chair beside the door and now it wasn't there! As I was looking for it, the landlord came in.\n\n'Did you have a good meal?' he asked.\n\n'Yes, thank you,' I answered, 'but I can't pay the bill. I haven't got my bag.'\n\nThe landlord smiled and immediately went out. In a few minutes he returned with my bag and gave it back to me.\n\n'I'm very sorry,' he said. 'My dog had taken it into the garden. He often does this!'\n\n版本差异: inn/innkeeper 改成了 pub/landlord", "chinese": "他经常干这种事！\n\n我在一家乡村小酒店吃过午饭后，就找我的提包。我曾把它放在门边的椅子上，可这会儿不见了！当我正在寻找时，酒店老板走了进来。\n\n“您吃得好吗？”他问。\n\n“很好，谢谢。”我回答，“但我付不了帐，我的提包没有了。”\n\n酒店老板笑了笑，马上走了出去。一会儿工夫他拿着我的提包回来了，把它还给了我。\n\n“实在抱歉，”他说，“我的狗把它弄到花园里去了，他常干这种事！”", "vocabulary": {"pub": "n. 小酒店", "landlord": "n. 店主", "bill": "n. 帐单"}}, {"id": 19, "title_en": "Sold out", "title_cn": "票已售完", "english": "'\n\nT\n\nhe play may begin at any moment,' I said.\n\n'It may have begun already,' Susan answered.\n\nI hurried to the ticket office. 'May I have two tickets please?' I asked.\n\n'I'm sorry, we've sold out,' the girl said.\n\n'What a pity!' Susan exclaimed.\n\nJust then, a man hurried to the ticket office.\n\n'Can I return these two tickets?' he asked.\n\n'Certainly,' the girl said.\n\nI went back to the ticket office at once.\n\n'Could I have those two tickets please?' I asked.\n\n'Certainly,' the girl said, 'but they're for next Wednesday's performance. Do you still want them?'\n\n'I might as well have them,' I said sadly.", "chinese": "票已售完\n\n“剧马上就要开演了，”我说。\n\n“也许已经开演了呢，”苏珊回答说。\n\n我匆匆赶到售票处，问：“我可以买两张票吗？”\n\n“对不起，票已售完。”那位姑娘说。\n\n“真可惜！”苏珊大声说。\n\n正在这时，一个男子匆匆奔向售票处。\n\n“我可以退掉这两张票吗？”他问。\n\n“当然可以，”那姑娘说。\n\n我马上又回到售票处。\n\n“我可以买那两张票吗？”我问。\n\n“当然可以，不过这两张票是下星期三的，您是否还要呢？”\n\n“我还是买下的好，”我垂头丧气地说。", "vocabulary": {"hurry": "v. 匆忙 ticket office 英 美 n. 售票处", "pity": "n. 令人遗憾的事", "exclaim": "v. 大声说", "return": "v. 退回", "sadly": "adv. 悲哀地，丧气地"}}, {"id": 20, "title_en": "One man in a boat", "title_cn": "独坐孤舟", "english": "F\n\nishing is my favourite sport. I often fish for hours without catching anything. But this does not worry me. Some fishermen are unlucky. Instead of catching fish, they catch old boots and rubbish. I am even less lucky. I never catch anything -- not even old boots. After having spent whole mornings on the river, I always go home with an empty bag. 'You must give up fishing!' my friends say. 'It's a waste of time.' But they don't realize one important thing. I'm not really interested in fishing. I am only interested in sitting in a boat and doing nothing at all!", "chinese": "独坐孤舟\n\n钓鱼是我特别喜爱的一项运动。我经常一钓数小时却一无所获，但我从不为此烦恼。有些垂钓者就是不走运，他们往往鱼钓不到，却钓上来些旧靴子和垃圾。我的运气甚至还不及他们。我什么东西也未钓到过——就连旧靴子也没有。我总是在河上呆上整整一上午，然后空着袋子回家。“你可别再钓鱼了！”我的朋友们说，“这是浪费时间。”然而他们没有认识到重要的一点，我并不是真的对钓鱼有兴趣，我感兴趣的只是独坐孤舟，无所事事！", "vocabulary": {"catch": "v. 抓到", "fisherman": "n. 钓鱼人，渔民", "boot": "n. 靴子", "waste": "n. 浪费", "realize": "v. 意识到"}}, {"id": 21, "title_en": "Mad or not?", "title_cn": "是不是疯了？", "english": "A\n\neroplanes are slowly driving me mad. I live near an airport and passing planes can be heard night and day. The airport was built years ago, but for some reason it could not be used then. Last year, however, it came into use. Over a hundred people must have been driven away from their homes by the noise. I am one of the few people left. Sometimes I think this house will be knocked down by a passing plane. I have been offered a large sum of money to go away, but I am determined to stay here. Everybody says I must be mad and they are probably right.\n\n版本差异: LM写的是...was built during the war, 改成了...was built years ago,", "chinese": "是不是疯了？\n\n飞机正在逐渐把我逼疯。\n\n我住在一个机场附近，过往飞机日夜不绝于耳。机场是许多年前建的，但由于某种原因当时未能启用。然而去年机场开始使用了。\n\n有100多人肯定是被噪音逼得已经弃家远去，我是少数留下来的人中的一个。有时我觉得这房子就要被一架飞过的飞机撞倒。\n\n他们曾向我提供一大笔钱让我搬走，但我决定留在这儿。大家都说我肯定是疯了，也许他们说的是对的。", "vocabulary": {"mad": "adj. 发疯", "reason": "n. 原因", "sum": "n. 量", "determined": "adj. 坚定的，下决心的"}}, {"id": 22, "title_en": "A glass envelope", "title_cn": "玻璃信封", "english": "M\n\ny daughter, Jane, never dreamed of receiving a letter from a girl of her own age in Holland. Last year, we were travelling across the Channel and Jane put a piece of paper with her name and address on it into a bottle. She threw the bottle into the sea. She never thought of it again, but ten months later, she received a letter from a girl in Holland. Both girls write to each other regularly now. However, they have decided to use the post office. Letters will cost a little more, but they will certainly travel faster.", "chinese": "玻璃信封\n\n我的女儿简从未想过会接到荷兰一位同龄姑娘的来信。去年，当我们横渡英吉利海峡时，简把写有她姓名和住址的一张纸条装进了一只瓶子，又将瓶子扔进了大海。此后她就再没去想那只瓶子。但10个月以后，她收到了荷兰一位姑娘的来信。现在这两位姑娘定期通信了。然而她们还是决定利用邮局。这样会稍微多花点钱，但肯定是快得多了。", "vocabulary": {"dream": "v. 做梦，梦想", "age": "n. 年龄", "channel": "n. 海峡", "throw": "v. 扔，抛"}}, {"id": 23, "title_en": "A new house", "title_cn": "新居", "english": "I\n\n had a letter from my sister yesterday. She lives in Nigeria. In her letter, she said that she would come to England next year. If she comes, she will get a surprise. We are now living in a beautiful new house in the country. Work on it had begun before my sister left. The house was completed five months ago. In my letter, I told her that she could stay with us. The house has many large rooms and there is a lovely garden. It is a very modern house, so it looks strange to some people. It must be the only modern house in the district.", "chinese": "新居\n\n昨天我收到了姐姐的一封信，她住在尼日利亚。在信中她说她明年将到英国来。如果她来了，她会感到非常惊奇了。我们现在住在乡间的一栋漂亮的新住宅里。这栋房子在我姐姐离开之前就已动工了，是在5个月以前竣工的。我在信中告诉她，她可以和我们住在一起。这栋房子里有许多房间，还有一个漂亮的花园。它是一栋非常现代化的住宅，因此在有些人看来很古怪。它肯定是这个地区唯一的一栋现代化住宅。", "vocabulary": {"complete": "v. 完成", "modern": "adj. 新式的，与以往不同的", "strange": "adj. 奇怪的", "district": "n. 地区"}}, {"id": 24, "title_en": "It could be worse", "title_cn": "不幸中之万幸", "english": "I\n\n entered the hotel manager's office and sat down. I had just lost £50 and I felt very upset. 'I left the money in my room,' I said, 'and it's not there now.' The manager was sympathetic, but he could do nothing. 'Everyone's losing money these days,' he said. He started to complain about this wicked world but was interrupted by a knock at the door. A girl came in and put an envelope on his desk. It contained £50. 'I found this outside this gentleman's room,' she said. 'Well,' I said to the manager, 'there is still some honesty in this world!'", "chinese": "不幸中之万幸\n\n我走进饭店经理的办公室，坐了下来。我刚刚丢了50英镑，感到非常烦恼。“我把钱放在房间里，”我说，“可现在没有了。”经理深表同情，但却无能为力。“现在大家都在丢钱，”他说。他开始抱怨起这个邪恶的世道来，却被一阵敲门声打断了。一个姑娘走了进来，把一个信封放在了他桌上。它里面装着50英镑。“这是我在这位先生的房门外捡到的，”她说。“是啊，”我对那位经理说，“这世界上还是有诚实可言的！”", "vocabulary": {"manager": "n. 经理", "upset": "adj. 不安", "sympathetic": "adj. 表示同情的", "complain": "v. 抱怨", "wicked": "adj. 很坏的，邪恶的", "contain": "v. 包含，内装", "honesty": "n. 诚实"}}, {"id": 25, "title_en": "Do the English speak English?", "title_cn": "英国人讲的是英语吗？", "english": "I\n\n arrived in London at last. The railway station was big, black and dark. I did not know the way to my hotel, so I asked a porter. I not only spoke English very carefully, but very clearly as well. The porter, however, could not understand me. I repeated my question several times and at last he understood. He answered me, but he spoke neither slowly nor clearly. 'I am a foreigner,' I said. Then he spoke slowly, but I could not understand him. My teacher never spoke English like that! The porter and I looked at each other and smiled. Then he said something and I understood it. 'You'll soon learn English!' he said. I wonder. In England, each person speaks a different language. The English understand each other, but I don't understand them! Do they speak English?\n\n版本差异: LM写的是 each man, 改成了 each person", "chinese": "英国人讲的是英语吗？\n\n我终于到了伦敦。火车站很大，又黑又暗。我不知道去饭店的路该怎么走，于是向一个搬运工打听。\n\n我的英语讲得不但非常认真，而且咬字也非常清楚。然而搬运工却不明白我的话。我把问话重复了很多遍。他终于听懂了。他回答了，但他讲得既不慢也不清楚。\n\n“我是个外国人，”我说。\n\n于是他说得慢了，可我还是听不懂。\n\n我的老师从来不那样讲英语！\n\n我和搬运工相视一笑。接着，他说了点什么，这回我听懂了。“您会很快学会英语的！”他说。\n\n我感到奇怪。在英国，人们各自说着一种不同的语言。英国人之间相互听得懂，可我却不懂他们的话！他们说的是英语吗？", "vocabulary": {"railway": "n. 铁路", "porter": "n. 搬运工", "several": "det. 几个", "foreigner": "n. 外国人", "wonder": "v. 感到奇怪"}}, {"id": 26, "title_en": "The best art critics", "title_cn": "最佳艺术评论家", "english": "I\n\n am an art student and I paint a lot of pictures. Many people pretend that they understand modern art. They always tell you what a picture is 'about'. Of course, many pictures are not 'about' anything. They are just pretty patterns. We like them in the same way that we like pretty curtain material. I think that young children often appreciate modern pictures better than anyone else. They notice more. My sister is only seven, but she always tells me whether my pictures are good or not. She came into my room yesterday.\n\n'What are you doing?' she asked.\n\n'I'm hanging this picture on the wall,' I answered. 'It's a new one. Do you like it?'\n\nShe looked at it critically for a moment. 'It's all right,' she said, 'but isn't it upside-down?'\n\nI looked at it again. She was right! It was!", "chinese": "最佳艺术评论家\n\n我是个学艺术的学生，画了很多画。有很多人装成很懂现代艺术的样子，总是告诉你一幅画的“意思”是什么。当然，有很多画是什么“意思”也没有的。它们就是些好看的图案，我们喜爱它们就像我们喜欢漂亮的窗帘布一样。我觉得小孩子们往往比任何人都更能欣赏现代绘画，他们观察到的东西更多。我的妹妹只有7岁，但她总能说出我的画是好还是坏。昨天她到我房里来了。\n\n“你在做什么？”她问。\n\n“我正在把画挂在墙上”我回答到。“这是一副新画，喜欢吗？”\n\n她带着批评的眼光看了一会儿，“挺好的”，她说，“不过是不是挂反了？“\n\n我再看了一下，她说的对，的确是挂反了！", "vocabulary": {"art": "n. 艺术", "critic": "n. 评论家", "paint": "v. 画", "pretend": "v. 假装", "pattern": "n. 图案", "curtain": "n. 窗帘，幕布", "material": "n. 材料", "appreciate": "v. 鉴赏", "notice": "v. 注意到", "whether": "conj. 是否", "hang": "v. 悬挂，吊", "critically": "adv. 批评地", "upside": "n. 上部，上侧，上面 upside-down ['ʌpsaid dd] 英 美 adj. 上下颠倒的"}}, {"id": 27, "title_en": "A wet night", "title_cn": "雨夜", "english": "L\n\nate in the afternoon, the boys put up their tent in the middle of a field. As soon as this was done, they cooked a meal over an open fire. They were all hungry and the food smelled good. After a wonderful meal, they told stories and sang songs by the campfire. But some time later it began to rain. The boys felt tired so they put out the fire and crept into their tent. Their sleeping bags were warm and comfortable, so they all slept soundly. In the middle of the night, two boys woke up and began shouting. The tent was full of water! They all leapt out of their sleeping bags and hurried outside. It was raining heavily and they found that a stream had formed in the field. The stream wound its way across the field and then flowed right under their tent!", "chinese": "雨夜\n\n傍晚时分，孩子们在田野中央搭起了帐篷。这件事刚刚做完，他们就在篝火上烧起了饭。他们全都饿了，饭菜散发出阵阵香味。他们美美地吃了一顿饭后，就围在营火旁讲起了故事，唱起了歌。但过了一阵子。天下起雨来，于是他们扑灭了篝火，钻进了帐篷。睡袋既暖和又舒服，所以，他们都睡得很香。午夜前后，有两个孩子醒了，大声叫了起来。原来帐篷里到处都是水！他们全都跳出睡袋，跑到外面。雨下得很大，他们发现地上已经形成了一条小溪。那小溪弯弯曲曲穿过田野，然后正好从他们的帐篷底下流过去。", "vocabulary": {"tent": "n. 帐篷", "field": "n. 田地，田野", "smell": "v. 闻起来", "wonderful": "adj. 极好的", "campfire": "n. 营火，篝火", "creep": "v. 爬行 sleeping bag ['sli:piŋ] 英 美 n. 睡袋", "comfortable": "adj. 舒适的，安逸的", "soundly": "adv. 香甜地", "leap": "v. 跳跃，跳起", "heavily": "adv. 大量地", "stream": "n. 小溪", "form": "v. 形成", "wind": "v. 蜿蜒", "right": "adv. 正好"}}, {"id": 28, "title_en": "No parking", "title_cn": "禁止停车", "english": "J\n\nasper White is one of those rare people who believes in ancient myths. He has just bought a new house in the city, but ever since he moved in, he has had trouble with cars and their owners. When he returns home at night, he always finds that someone has parked a car outside his gate. Because of this, he has not been able to get his own car into his garage even once. Jasper has put up 'No Parking' signs outside his gate, but these have not had any effect. Now he has put an ugly stone head over the gate. It is one of the ugliest faces I have ever seen. I asked him what it was and he told me that it was Medusa, the Gorgon. Jasper hopes that she will turn cars and their owners to stone. But none of them has been turned to stone yet!\n\n版本差异: LM写的是 motorists, 改成了 cars and their owners", "chinese": "禁止停车\n\n贾斯珀·怀特是少有的相信古代神话的人之一。\n\n他刚在城里买下一所新房子，但自从搬进去后，就和汽车及车主们发生了磨擦。\n\n当他夜里回到家时，总是发现有人把车停在他家大门外。为此，他甚至一次也没能把自己的车开进车库。\n\n贾斯珀曾把几块“禁止停车”的牌子挂在大门外边，但没有任何效果。\n\n现在他把一个丑陋的石雕头像放在了大门上边，这是我见过的最丑陋的头像之一。我问他那是什么？他告诉我那是蛇发女怪美杜莎。贾斯珀希望她把汽车和车主们都变成石头。但到目前为止还没有一个变成石头呢！", "vocabulary": {"rare": "adj. 罕见的", "ancient": "adj. 古代的，古老的", "myth": "n. 神话故事", "trouble": "n. 麻烦", "effect": "n. 结果，效果", "medusa": "n. 美杜莎(古希腊神话中3位蛇发女怪之一)", "gorgon": "n. (古希腊神话中的)3位蛇发女怪之一"}}, {"id": 29, "title_en": "Taxi!", "title_cn": "出租汽车！", "english": "C\n\naptain Ben Fawcett has bought an unusual taxi and has begun a new service. The 'taxi' is a small Swiss aeroplane called a 'Pilatus Porter'. This wonderful plane can carry seven passengers. The most surprising thing about it, however, is that it can land anywhere: on snow, water, or even on a ploughed field. Captain Fawcett's first passenger was a doctor who flew from Birmingham to a lonely village in the Welsh mountains. Since then, Captain Fawcett has flown passengers to many unusual places. Once he landed on the roof of a block of flats and on another occasion, he landed in a deserted car park. Captain Fawcett has just refused a strange request from a businessman. The man wanted to fly to Rockall, a lonely island in the Atlantic Ocean, but Captain Fawcett did not take him because the trip was too dangerous.", "chinese": "出租汽车！\n\n本·弗西特机长买了一辆不同寻常的出租汽车，并开始了一项新的业务。这辆“出租汽车”是一架小型瑞士飞机，叫“皮勒特斯·波特“Pilatus Porter号，这架奇妙的飞机可以载7名乘客。\n\n然而，最令人惊奇的是它能够在任何地方降落：雪地上，水面上，甚至刚耕过的田里。\n\n弗西特机长的第一名乘客是位医生，他从伯明翰飞往威尔士山区一个偏僻的村庄。从那时开始，弗西特机长已经载送乘客到过许多不寻常的地方。\n\n一次，他把飞机降落在了一栋公寓楼的屋顶上；还有一次，降落在了一个废弃的停车场上。\n\n弗西特机长刚刚拒绝了一位商人的奇怪要求。这个人想要飞往大西洋上的一个孤岛——罗卡尔岛，弗西特机长之所以不送他去，是因为那段飞行太危险了。", "vocabulary": {"taxi": "n. 出租汽车 Pilatus Porter 英 美 n. 皮勒特斯·波特(飞机机名)", "land": "v. 着陆", "plough": "v. 耕地", "lonely": "adj. 偏僻的，人迹罕至的", "welsh": "adj. 威尔士的", "roof": "n. 楼顶", "block": "n. 一座大楼", "flat": "n. 公寓房", "desert": "v. 废弃"}}, {"id": 30, "title_en": "Football or polo?", "title_cn": "足球还是水球？", "english": "T\n\nhe Wayle is a small river that cuts across the park near my home. I like sitting by the Wayle on fine afternoons. It was warm last Sunday, so I went and sat on the river bank as usual. Some children were playing games on the bank and there were some people rowing on the river. Suddenly, one of the children kicked a ball very hard and it went towards a passing boat. Some people on the bank called out to the man in the boat, but he did not hear them. The ball struck him so hard that he nearly fell into the water. I turned to look at the children, but there weren't any in sight: they had all run away! The man laughed when he realized what had happened. He called out to the children and threw the ball back to the bank.", "chinese": "足球还是水球？\n\n威尔河是横穿过我家附近公园的一条小河。我喜欢在天气晴朗的下午到河边坐坐。\n\n上星期日天气很暖和。于是我和往常一样，又去河边坐着。河岸上有些孩子正在玩耍，河面上有些人正在划船。\n\n突然，一个孩子狠狠地踢了一脚球，球便向着一只划过来的小船飞去。岸上的一些人对着小船上的人高喊，但他没有听见。\n\n球重重地打在他身上，使他差点儿落入水中。我转过头去看那些孩子，但一个也不见，全都跑了！\n\n当那个人明白了发生的事情时，笑了起来。他大声叫着那些孩子，把球扔回到岸上。", "vocabulary": {"polo": "n. 水球", "cut": "v. 穿过", "row": "v. 划(船)", "kick": "v. 踢", "towards": "prep. 朝，向", "nearly": "adv. 几乎", "sight": "n. 眼界，视域"}}, {"id": 31, "title_en": "Success story", "title_cn": "成功者的故事", "english": "Y\n\nesterday afternoon Frank Hawkins was telling me about his experiences as a young man. Before he retired, Frank was the head of a very large business company, but as a boy he used to work in a small shop. It was his job to repair bicycles and at that time he used to work fourteen hours a day. He saved money for years and in 1958 he bought a small workshop of his own. In his twenties Frank used to make spare parts for aeroplanes. At that time he had two helpers. In a few years, the small workshop had become a large factory which employed seven hundred and twenty-eight people. Frank smiled when he remembered his hard early years and the long road to success. He was still smiling when the door opened and his wife came in. She wanted him to repair their grandson's bicycle!\n\n版本差异: 相比67版，97版在多个地方做了修改，比如不在文中提及战争，同时最后一句的son改成了grandson", "chinese": "成功者的故事\n\n昨天下午弗兰克·霍金斯向我讲述了他年轻时的经历。\n\n在退休前，弗兰克是一家非常大的商业公司的经理，但他小时候却在一家小铺里做工。他那时的工作是修理自行车，并且通常是一天工作14个小时。\n\n他靠多年积蓄，于1958年买下了自己的一个小铺子。20多岁的时候，弗兰克曾生产飞机零配件。那时他有两个帮手。几年之后，小铺子已经发展成了一个雇有728人的大工厂。\n\n弗兰克回想着他早年的艰难经历和走过的漫长的成功之路，微笑了。他正笑着的时候门开了，他的妻子走了进来。她叫他去修理孙子的自行车。", "vocabulary": {"retire": "v. 退休", "company": "n. 公司", "bicycle": "n. 自行车", "save": "v. 积蓄", "workshop": "n. 车间", "helper": "n. 帮手，助手", "employ": "v. 雇佣", "grandson": "n. 孙子"}}, {"id": 32, "title_en": "Shopping made easy", "title_cn": "购物变得很方便", "english": "P\n\neople are not so honest as they once were. The temptation to steal is greater than ever before -- especially in large shops. A detective recently watched a well-dressed woman who always went into a large store on Monday mornings. One Monday, there were fewer people in the shop than usual when the woman came in, so it was easier for the detective to watch her. The woman first bought a few small articles. After a little time, she chose one of the most expensive dresses in the shop and handed it to an assistant who wrapped it up for her as quickly as possible. Then the woman simply took the parcel and walked out of the shop without paying. When she was arrested, the detective found out that the shop assistant was her daughter. The girl 'gave' her mother a free dress once a week!", "chinese": "购物变得很方便\n\n人们不再像以前那样诚实了。偷窃的诱惑力比以往任何时候都更强烈——特别是在大的商店里。\n\n一名侦探最近注意上了一位穿着讲究的妇女，她总是在星期一上午进入一家大商场。有一个星期一，当这位妇女走进这家商场时，里面的人比往常少，因此，侦探比较容易监视她。\n\n这位妇女先是买了几样小商品。过了一会儿，她又选了商场里最昂贵的一件衣服，把它递给了售货员。那售货员以最快的速度为她包好了衣服。然后，那妇女拿过包就走出了商场，根本没有付钱。\n\n她被逮捕后。侦探发现原来那售货员是她的女儿。那姑娘每星期“送”她母亲一件免费的衣服！", "vocabulary": {"once": "adv. 曾经，以前", "temptation": "n. 诱惑", "article": "n. 物品，东西", "wrap": "v. 包裹", "simply": "adv. 仅仅", "arrest": "v. 逮捕"}}, {"id": 33, "title_en": "Out of the darkness", "title_cn": "冲出黑暗", "english": "N\n\nearly a week passed before the girl was able to explain what had happened to her. One afternoon she set out from the coast in a small boat and was caught in a storm. Towards evening, the boat struck a rock and the girl jumped into the sea. Then she swam to the shore after spending the whole night in the water. During that time she covered a distance of eight miles. Early next morning, she saw a light ahead. She knew she was near the shore because the light was high up on the cliffs. On arriving at the shore, the girl struggled up the cliff towards the light she had seen. That was all she remembered. When she woke up a day later, she found herself in hospital.", "chinese": "冲出黑暗\n\n几乎过了一个星期，那姑娘才能讲述自己的遭遇。\n\n一天下午，她乘小船从海岸出发，遇上了风暴。天将黑时，小船撞在了一块礁石上，姑娘跳进了海里。她在海里游了整整一夜才游到岸边。在那段时间里，她游了8英里。\n\n第二天凌晨，她看到前方有灯光，知道自己已经接近岸边了，因为那灯光是在高高的峭壁上。到达岸边后，姑娘朝着她看到的灯光方向挣扎着往峭壁上爬去。她所记得的就是这些。\n\n第二天（一天后）她醒来时，发现自己躺在医院里。", "vocabulary": {"darkness": "n. 黑暗", "explain": "v. 解释，叙述", "coast": "n. 海岸", "storm": "n. 暴风雨", "towards": "prep. 接近", "rock": "n. 岩石，礁石", "shore": "n. 海岸", "light": "n. 灯光", "ahead": "adv. 在前面", "cliff": "n. 峭壁", "struggle": "v. 挣扎", "hospital": "n. 医院"}}, {"id": 34, "title_en": "Quick work", "title_cn": "破案神速", "english": "D\n\nan Robinson has been worried all week. Last Tuesday he received a letter from the local police. In the letter he was asked to call at the station. Dan wondered why he was wanted by the police, but he went to the station yesterday and now he is not worried anymore. At the station, he was told by a smiling policeman that his bicycle had been found. Five days ago, the policeman told him, the bicycle was picked up in a small village four hundred miles away. It is now being sent to his home by train. Dan was most surprised when he heard the news. He was amused too, because he never expected the bicycle to be found. It was stolen twenty years ago when Dan was a boy of fifteen!\n\n版本差异: 旧版人名是 Ted, 新版改为 Dan, 想不通改这个的意义何在。", "chinese": "破案神速\n\n丹·鲁宾逊焦虑了整整一个星期。上星期二他收到当地警察局的一封信，要他到警察局去一趟。丹奇怪警察为什么找他，但昨天还是去了，结果他不再担心了。\n\n在警察局里，一位面带笑容的警察告诉他，他的自行车找到了。那位警察对他说，那辆自行车是5天前在400英里外的一个小村里发现的，现在正用火车给他运回家来。\n\n丹听到这个消息后，惊奇万分，但又感到非常好笑，因为他从未指望那辆自行车还能找到。这是20年前丹还是一个15岁的孩子时被人偷走的！", "vocabulary": {"station": "n. (警察)局", "most": "adv. 相当，非常"}}, {"id": 35, "title_en": "Stop thief!", "title_cn": "捉贼！", "english": "R\n\noy Trenton used to drive a taxi. A short while ago, however, he became a bus driver and he has not regretted it. He is finding his new work far more exciting. When he was driving along Catford Street recently, he saw two thieves rush out of a shop and run towards a waiting car. One of them was carrying a bag full of money. Roy acted quickly and drove the bus straight at the thieves. The one with the money got such a fright that he dropped the bag. As the thieves were trying to get away in their car, Roy drove his bus into the back of it. While the battered car was moving away, Roy stopped his bus and telephoned the police. The thieves' car was badly damaged and easy to recognize. Shortly afterwards, the police stopped the car and both men were arrested.", "chinese": "捉贼！\n\n罗伊·特雷顿原是开出租汽车的，然而就在前不久，他开上了公共汽车，也并不为此而感到后悔。他发觉自己的新工作令人兴奋得多。\n\n最近，当他正开车在凯特福德街上行驶时，看到有两个小偷从一家商店里冲出来，奔向等在那里的一辆汽车，其中一个提着一只装满钞票的提包。\n\n罗伊行动迅速，开车直冲窃贼而去。拿钱的那个小偷吓得把提包都扔了。当那两个小偷企图乘车逃跑时，罗伊驾驶他的公共汽车撞在了那辆车的后尾上。当那辆被撞坏的车开走后，罗伊停下车，给警察挂了电话。小偷的车损坏严重，很容易辨认。没过多久，警察就截住了那辆车，两个小偷都被抓住了。", "vocabulary": {"while": "n. 一段时间", "regret": "v. 后悔", "far": "adv. 非常", "rush": "v. 冲", "act": "v. 行动", "straight": "adv. 径直", "fright": "n. 害怕", "battered": "adj. 撞坏的", "shortly": "adv. 很快，不久", "afterwards": "adv. 以后"}}, {"id": 36, "title_en": "Across the Channel", "title_cn": "横渡海峡", "english": "D\n\nebbie Hart is going to swim across the English Channel tomorrow. She is going to set out from the French coast at five o'clock in the morning. Debbie is only eleven years old and she hopes to set up a new world record. She is a strong swimmer and many people feel that she is sure to succeed. Debbie's father will set out with her in a small boat. Mr Hart has trained his daughter for years. Tomorrow he will be watching her anxiously as she swims the long distance to England. Debbie intends to take short rests every two hours. She will have something to drink but she will not eat any solid food. Most of Debbie's school friends will be waiting for her on the English coast. Among them will be Debbie's mother, who swam the Channel herself when she was a girl.\n\n版本差异: 旧版人名是Erna Hart，14岁, 新版改名为 Debbie Hart, 年龄则降低为11岁。", "chinese": "横渡海峡\n\n黛比·哈特准备明天横渡英吉利海峡。\n\n她打算早上5点钟从法国海岸出发。黛比只有11岁，她希望创一项新的世界纪录。\n\n黛比的父亲将乘一条小船同她一道出发。哈特先生训练她的女儿已经多年了，明天他将焦急地注视着女儿游过这段漫长的距离到达英国。\n\n黛比计划每两小时休息一下。她将喝些饮料，但不吃固体食物。\n\n黛比的大部分同学将在英国海岸等候她。他们当中还会有黛比的母亲，她本人还是个姑娘时，也曾横渡过英吉利海峡！", "vocabulary": {"record": "n. 记录", "strong": "adj. 强壮的", "swimmer": "n. 游泳运动员", "succeed": "v. 成功", "train": "v. 训练", "anxiously": "adv. 焦急地", "intend": "v. 打算", "solid": "adj. 固体的，硬的"}}, {"id": 37, "title_en": "The Olympic Games", "title_cn": "奥林匹克运动会", "english": "T\n\nhe Olympic Games will be held in our country in four years' time. As a great many people will be visiting the country, the government will be building new hotels, an immense stadium, and a new Olympic standard swimming pool. They will also be building new roads and a special railway line. The Games will be held just outside the capital and the whole area will be called 'Olympic City'. Workers will have completed the new roads by the end of this year. By the end of next year, they will have finished work on the new stadium. The fantastic modern buildings have been designed by Kurt Gunter. Everybody will be watching anxiously as the new buildings go up. We are all very excited and are looking forward to the Olympic Games because they have never been held before in this country.\n\n版本差异: 旧版的 a fine new swimming pool改做了 a new Olympic standard swimming pool 旧版的 The fine modern buildings, 新版使用了更高级的词汇 fantastic 替代了fine。", "chinese": "奥林匹克运动会\n\n4年以后，奥林匹克运动会将在我们国家举行。\n\n由于将有大批的人到我们国家来，所以政府准备建造一些新的饭店、一个大型体育场和一个新的奥运会标准游泳池。他们还将修筑一些新的道路和一条铁路专线。\n\n奥运会就在首都市郊举办，整个地区将被称作“奥林匹克城”。工人们将在今年年底前把新路铺好；到明年年底，他们将把新体育场建成。\n\n这些巨大的现代化建筑是由库尔特·冈特设计的。大家都将急切地注视着新建筑的建成。我们都非常激动，盼望着奥运会的到来，因为在这个国家里还从未举办过奥运会。", "vocabulary": {"olympic": "adj. 奥林匹克的", "hold": "v. 召开", "government": "n. 政府", "immense": "adj. 巨大的", "stadium": "n. 露天体育场", "standard": "n. 标准", "capital": "n. 首都", "fantastic": "adj. 巨大的", "design": "v. 设计"}}, {"id": 38, "title_en": "Everything except the weather", "title_cn": "唯独没有考虑到天气", "english": "M\n\ny old friend, Harrison, had lived in the Mediterranean for many years before he returned to England. He had often dreamed of retiring in England and had planned to settle down in the country. He had no sooner returned than he bought a house and went to live there. Almost immediately he began to complain about the weather, for even though it was still summer, it rained continually and it was often bitterly cold. After so many years of sunshine, Harrison got a shock. He acted as if he had never lived in England before. In the end, it was more than he could bear. He had hardly had time to settle down when he sold the house and left the country. The dream he had had for so many years ended there. Harrison had thought of everything except the weather.\n\n版本差异: 原版是 he bought a fine house 新版把 fine 去掉了。", "chinese": "唯独没有考虑到天气\n\n我的老朋友哈里森在回到英国以前曾多年居住在地中海地区。过去他常幻想退休后到英国，并计划在乡间安顿下来。\n\n他刚一回到英国便买下了一幢房子住了进去。但紧接着他就开始抱怨那里的天气了。因为即使那时仍为夏季，但雨总是下个不停，而且常常冷得厉害。\n\n在阳光下生活了那么多年的哈里森对此感到惊奇。他的举动就好像他从未在英国生活过一样。最后，他再也忍受不住，还没等安顿下来就卖掉了房子，离开了这个国家。\n\n他多年来的幻想从此破灭。哈里森把每件事情都考虑到了，唯独没想到天气。", "vocabulary": {"except": "prep. 除了", "mediterranean": "n. (the～)地中海", "complain": "v. 抱怨", "continually": "adv. 不断地", "bitterly": "adv. 刺骨地", "sunshine": "n. 阳光"}}, {"id": 39, "title_en": "Am I all right?", "title_cn": "我是否痊愈？", "english": "W\n\nhile John Gilbert was in hospital, he asked his doctor to tell him whether his operation had been successful, but the doctor refused to do so. The following day, the patient asked for a bedside telephone. When he was alone, he telephoned the hospital exchange and asked for Doctor Millington. When the doctor answered the phone, Mr Gilbert said he was inquiring about a certain patient, a Mr John Gilbert. He asked if Mr Gilbert's operation had been successful and the doctor told him that it had been. He then asked when Mr Gilbert would be allowed to go home and the doctor told him that he would have to stay in hosptial for another two weeks. Then Dr. Millington asked the caller if he was a relative of the patient. 'No,' the patient answered, 'I am Mr John Gilbert.'", "chinese": "我是否痊愈？\n\n当约翰·吉尔伯特住院的时候，他问医生他的手术是否成功，但医生拒绝告诉他。\n\n第二天，这位病人要了一部床头电话。当房里只剩他一个人时，他挂通了医院的交换台，要求与米灵顿医生讲话。\n\n当这位医生接过电话时，吉尔伯特先生说他想询问一个病人的情况，是一位名叫约翰·吉尔伯特的先生。\n\n他问吉尔伯特先生的手术中否成功，医生告诉他手术很成功。然后他又问吉尔伯特先生什么时候可以回家，医生说他在医院还必须再住上两个星期。\n\n之后，米灵顿医生问打电话的人是否是病人的亲属。“不是，”病人回答说，“我就是约翰·吉尔伯特先生。”", "vocabulary": {"operation": "n. 手术", "successful": "adj. 成功的", "following": "adj. 下一个", "patient": "n. 病人", "alone": "adj. 独自的", "exchange": "n. (电话的)交换台", "inquire": "v. 询问，打听", "certain": "adj. 某个", "caller": "n. 打电话的人", "relative": "n. 亲戚"}}, {"id": 40, "title_en": "Food and talk", "title_cn": "进餐与交谈", "english": "L\n\nast week at a dinner party, the hostess asked me to sit next to Mrs Rumbold. Mrs Rumbold was a large, unsmiling lady in a tight black dress. She did not even look up when I took my seat beside her. Her eyes were fixed on her plate and in a short time, she was busy eating. I tried to make conversation.\n\n'A new play is coming to \"The Globe\" soon,' I said. 'Will you be seeing it?'\n\n'No,' she answered.\n\n'Will you be spending your holidays abroad this year?' I asked.\n\n'No,' she answered.\n\n'Will you be staying in England?' I asked.\n\n'No,' she answered.\n\nIn despair, I asked her whether she was enjoying her dinner.\n\n'Young man,' she answered, 'if you ate more and talked less, we would both enjoy our dinner!'", "chinese": "进餐与交谈\n\n在上星期的一次宴会上，女主人安排我坐在兰伯尔德夫人的身旁。\n\n兰伯尔德夫人是一位身材高大、表情严肃的女人，穿一件紧身的黑衣服。当我在她身旁坐下来的时候，她甚至连头都没有抬一下。她的眼睛盯着自己的盘子，不一会儿就忙着吃起来了。我试图找个话题和她聊聊。\n\n“一出新剧要来'环球剧场'上演了，”我说，“您去看吗？”\n\n“不，”她回答。\n\n“您今年去国外度假吗？”我又问。\n\n“不，”她回答。\n\n“您就呆在英国吗？”我问。\n\n“不，”她回答。\n\n失望之中我问她饭是否吃得满意。\n\n“年轻人，”她回答说，“如果你多吃点，少说点，我们两个都会吃得好的！”", "vocabulary": {"hostess": "n. 女主人", "unsmiling": "adj. 不笑的，严肃的", "tight": "adj. 紧身的", "fix": "v. 疑视", "globe": "n. 地球", "despair": "n. 绝望"}}, {"id": 41, "title_en": "Do you call that a hat?", "title_cn": "你把那个叫帽子吗？", "english": "'\n\nD\n\no you call that a hat?' I said to my wife.\n\n'You needn't be so rude about it,' my wife answered as she looked at herself in the mirror.\n\nI sat down on one of those modern chairs with holes in it and waited. We had been in the hat shop for half an hour and my wife was still in front of the mirror.\n\n'We mustn't buy things we don't need,' I remarked suddenly. I regretted saying it almost at once.\n\n'You needn't have said that,' my wife answered. 'I need not remind you of that terrible tie you bought yesterday.'\n\n'I find it beautiful,' I said. 'A man can never have too many ties.'\n\n'And a woman can't have too many hats,' she answered.\n\nTen minutes later we walked out of the shop together. My wife was wearing a hat that looked like a lighthouse!", "chinese": "你把那个叫帽子吗？\n\n“你把那个叫帽子吗？”我对妻子说。\n\n“你说话没必要这样不客气，”我的妻子边回答边照着镜子。\n\n我坐在一个新式的满是网眼儿的椅子上，等待着。我们在这家帽店已经呆了半个小时了，而我的妻子仍在镜子面前。\n\n“我们不应该买我们不需要的东西，”我突然发表意见说，但马上又后悔说了这话。\n\n“你没必要这么说，”我妻子回答说，“我也不必提醒你昨天买的那条糟糕透了的领带。”\n\n“我觉得它好看，”我说，“男人有多少领带也不会嫌多。”\n\n“女人有多少帽子也不嫌多。”她回答。\n\n10分钟以后，我们一道走出了商店。我妻子戴着一顶像灯塔一样的帽子。", "vocabulary": {"rude": "adj. 无礼的", "mirror": "n. 镜子", "hole": "n. 孔", "remark": "v. 评说", "remind": "v. 提醒", "lighthouse": "n. 灯塔"}}, {"id": 42, "title_en": "Not very musical", "title_cn": "并非很懂音乐", "english": "A\n\ns we had had a long walk through one of the markets of Old Delhi, we stopped at a square to have a rest. After a time, we noticed a snake charmer with two large baskets at the other side of the square, so we went to have a look at him. As soon as he saw us, he picked up a long pipe which was covered with coins and opened one of the baskets. When he began to play a tune, we had our first glimpse of the snake. It rose out of the basket and began to follow the movements of the pipe. We were very much surprised when the snake charmer suddenly began to play jazz tunes and popular modern songs. The snake, however, continued to 'dance' slowly. It obviously could not tell the difference between Indian music and jazz!", "chinese": "并非很懂音乐\n\n当我们穿过旧德里的市场时走了很长一段路，我们在一个广场上停下来休息。过了一会儿，我们注意到广场的那一边有一个带着两个大筐的耍蛇人，于是就走过去看看。\n\n他一见我们，就拿起了一个长长的上面镶有硬币的管乐器，并掀开了一个筐的盖子。当他开始吹奏一支曲子时，我们才第一次看到那条蛇。它从筐里探出身子，随着乐器的摆动而扭动。\n\n当耍蛇人突然又吹奏起爵士乐和现代流行乐曲时，我们感到非常惊奇。然而那蛇却还是缓慢地“舞动”着。显然，它分辨不出印度音乐和爵士乐！", "vocabulary": {"musical": "adj. 精通音乐的", "market": "n. 市场，集市 snake charmer [ˈsneɪk ˌtʃɑːmə(r)] 英 美 n. 玩蛇者(通常借音乐控制)", "pipe": "n. (吹奏地)管乐器", "tune": "n. 曲调", "glimpse": "n. 一瞥", "snake": "n. 蛇", "movement": "n. 动作", "continue": "v. 继续", "dance": "v. 跳舞", "obviously": "adv. 显然", "difference": "n. 差别", "indian": "adj. 印度的"}}, {"id": 43, "title_en": "Over the South Pole", "title_cn": "飞越南极", "english": "I\n\nn 1929, three years after his flight over the North Pole, the American explorer, R. E. Byrd, successfully flew over the South Pole for the first time. Though, at first, Byrd and his men were able to take a great many photographs of the mountains that lay below, they soon ran into serious trouble. At one point, it seemed certain that their plane would crash. It could only get over the mountains if it rose to 10,000 feet. Byrd at once ordered his men to throw out two heavy food sacks. The plane was then able to rise and it cleared the mountains by 400 feet. Byrd now knew that he would be able to reach the South Pole which was 300 miles away, for there were no more mountains in sight. The aircraft was able to fly over the endless white plains without difficulty.", "chinese": "飞越南极\n\n美国探险家 R.E. 伯德在飞越北极3年之后，于1929年第一次飞越了南极。\n\n虽然开始时伯德和他的助手们拍下了飞机下面连绵群山的大量照片，但他们很快就陷入了困境。\n\n在有个地方，飞机似乎肯定要坠毁了。只有在飞至10,000英尺的高度时，它才能飞过这些山头。\n\n伯德马上命令他的助手们把两个沉重的食物袋扔掉，于是飞机可以上升了，它在离山头400英尺的高度飞越了过去。\n\n伯德这时知道他能够顺利飞抵300英里以外的南极了，因为前面再没有山了。飞机可以毫无困难地飞过这片茫茫无际的白色原野！", "vocabulary": {"pole": "n. (地球的)极", "flight": "n. 飞行", "explorer": "n. 探险家", "lie": "v. 处于", "serious": "adj. 严重的", "point": "n. 地点", "seem": "v. 似乎，好像", "crash": "v. 坠毁", "sack": "n. 袋子", "clear": "v. 越过", "aircraft": "n. 飞机", "endless": "adj. 无尽的", "plain": "n. 平原"}}, {"id": 44, "title_en": "Through the forest", "title_cn": "穿过森林", "english": "M\n\nrs Anne Sterling did not think of the risk she was taking when she ran through a forest after two men. They had rushed up to her while she was having a picnic at the edge of a forest with her children and tried to steal her handbag. In the struggle, the strap broke and, with the bag in their possession, both men started running through the trees. Mrs Sterling got so angry that she ran after them. She was soon out of breath, but she continued to run. When she caught up with them, she saw that they had sat down and were going through the contents of the bag, so she ran straight at them. The men got such a fright that they dropped the bag and ran away. 'The strap needs mending,' said Mrs Sterling later, 'but they did not steal anything.'", "chinese": "穿过森林\n\n安·斯特林夫人在穿过森林追赶两个男人时，她并没有考虑到所冒的风险。\n\n刚才，当她和孩子们正在森林边上野餐的时候，这两个人冲到她跟前，企图抢走她的手提包。在争抢中，手提包的带断了，包落入这两个人手里，他们拔腿跑进了树林。\n\n斯特林夫人非常气愤，向着他们追了过去。只追了一会儿便上气不接下气了，但她还是继续追赶。\n\n当她赶上他们时，发现他们已经坐了下来，正翻着包里的东西。于是她直冲过去。这两个人吓了一跳，扔下提包逃跑了。\n\n“这提包带需要修理，”斯特林夫人事后说道，“不过他们什么也没偷走。”", "vocabulary": {"forest": "n. 森林", "risk": "n. 危险，冒险", "picnic": "n. 野餐", "edge": "n. 边缘", "strap": "n. 带，皮带", "possession": "n. 所有", "breath": "n. 呼吸", "contents": "n. (常用复数)内有的物品", "mend": "v. 修理"}}, {"id": 45, "title_en": "A clear conscience", "title_cn": "问心无愧", "english": "T\n\nhe whole village soon learnt that a large sum of money had been lost. Sam Benton, the local butcher, had lost his wallet while taking his savings to the post office. Sam was sure that the wallet must have been found by one of the villagers, but it was not returned to him. Three months passed, and then one morning, Sam found his wallet outside his front door. It had been wrapped up in newspaper and it contained half the money he had lost, together with a note which said: 'A thief, yes, but only 50 per cent a thief!' Two months later, some more money was sent to Sam with another note: 'Only 25 per cent a thief now!' In time, all Sam's money was paid back in this way. The last note said: 'I am 100 per cent honest now!'", "chinese": "问心无愧\n\n整个村子很快知道，有一大笔钱丢失了。当地的屠户萨姆·本顿在把存款送往邮局的途中把钱包丢了。萨姆确信那钱包一定是被某个村民捡到了，可是却不见有人来送还给他。\n\n3个月过去了，后来在一天早晨，萨姆在自己的大门外发现了他的钱包。钱包是用报纸包着的，里面有他丢失的钱的一半，而且还附着一张纸条，上面写着：“一个小偷，是的，但只是一个50%的小偷！”\n\n又过了两个月，又有一些钱送还给了萨姆，又附了一张字条：“这回只是25%的小偷了！”很快，萨姆全部的钱都用同样的方式还了回来。最后的那张字条上写道：“我现在是一个100%的诚实人了！”", "vocabulary": {"clear": "adj. 无罪的，不亏心的", "conscience": "n. 良心，道德心", "wallet": "n. 皮夹，钱夹", "savings": "n. 存款", "villager": "n. 村民 per cent [pə'sent] 英 美 n. 百分之…"}}, {"id": 46, "title_en": "Expensive and uncomfortable", "title_cn": "既昂贵又受罪", "english": "W\n\nhen a plane from London arrived at Sydney airport, workers began to unload a number of wooden boxes which contained clothing. No one could account for the fact that one of the boxes was extremely heavy. It suddenly occurred to one of the workers to open up the box. He was astonished at what he found. A man was lying in the box on top of a pile of woolen goods. He was so surprised at being discovered that he did not even try to run away. After he was arrested, the man admitted hiding in the box before the plane left London. He had had a long and uncomfortable trip, for he had been confined to the wooden box for over eighteen hours. The man was ordered to pay £3500 for the cost of the trip. The normal price of a ticket is £2000!\n\n版本差异: 旧版做£345和£230，新版通货膨胀机票涨价了。", "chinese": "既昂贵又受罪\n\n当一架来自伦敦的飞机抵达悉尼机场时，工人们开始卸下装有服装的一批木箱。其中有只箱子特别重，可谁也弄不清是怎么回事。\n\n突然一个工人想到打开箱子看看。看到的情景使吃惊，箱内有一个人正躺在一堆毛织品之上。他由于被人发现而感到非常吃惊，甚至都没有企图逃跑。\n\n此人被逮捕后，承认他是在飞机离开伦敦前躲进箱里的。他经历了一次漫长而又难受的旅程，因为他在那木箱里闷了18个多小时。此人被责令交付旅费3,500英镑，而正常票价是2,000英镑！", "vocabulary": {"unload": "v. 卸(货)", "wooden": "adj. 木制的", "extremely": "adv. 非常，极其", "occur": "v. 发生", "astonish": "v. 使惊讶", "pile": "n. 堆", "woollen": "n. 羊毛的", "goods": "n. (常用复数)货物，商品", "discover": "v. 发现", "admit": "v. 承认", "confine": "v. 关在(一个狭小的空间里)", "normal": "adj. 正常的，通常的"}}, {"id": 47, "title_en": "A thirsty ghost", "title_cn": "嗜酒的鬼魂", "english": "A\n\n public house which was recently bought by Mr Ian Thompson is up for sale. MrThompson is going to sell it because it is haunted. He told me that he could not go to sleep one night because he heard a strange noise coming from the bar. The next morning, he found that the doors had been blocked by chairs and the furniture had been moved. Though Mr Thompson had turned the lights off before he went to bed, they were on in the morning. He also said that he had found five empty whisky bottles which the ghost must have drunk the night before. When I suggested that some villagers must have come in for a free drink, Mr Thompson shook his head. The villagers have told him that they will not accept the pub even if he gives it away.\n\n版本差异: 旧版做inn，新版改成pub", "chinese": "嗜酒的鬼魂\n\n伊恩·汤普森先生最近才买的一个小酒店现在又要卖出去。汤普森先生之所以想卖它，是因为那里常闹鬼。\n\n他告诉我有天夜里他怎么也睡不着，因为他听到酒吧里传来一阵奇怪的响声。\n\n第二天早上，他发现酒吧间的门被椅子堵上了，家具也被挪动过。虽然汤普森临睡觉时把灯关了，但早晨灯却都亮着。他还说他发现了5只空的威士忌瓶子，肯定是鬼魂昨天晚上喝的。\n\n当我暗示说一定是村里有些人来喝不花钱的酒时，汤普森先生摇了摇头。村里的人已经告诉他，即使他把小酒店白送人，他们也不要。", "vocabulary": {"thirsty": "adj. 贪杯的", "ghost": "n. 鬼魂", "haunt": "v. (鬼)来访，闹鬼", "block": "v. 堵", "furniture": "n. 家具", "whisky": "n. 威士忌酒", "suggest": "v. 暗示", "shake": "v. 摇动", "accept": "v. 接受"}}, {"id": 48, "title_en": "Did you want to tell me something?", "title_cn": "你想对我说什么吗？", "english": "D\n\nentists always ask questions when it is impossible for you to answer. My dentist had just pulled out one of my teeth and had told me to rest for a while. I tried to say something, but my mouth was full of cotton wool. He knew I collected match boxes and asked me whether my collection was growing. He then asked me how my brother was and whether I liked my new job in London. In answer to these questions I either nodded or made strange noises. Meanwhile, my tongue was busy searching out the hole where the tooth had been. I suddenly felt very worried, but could not say anything. When the dentist at last removed the cotton wool from my mouth, I was able to tell him that he had pulled out the wrong tooth.\n\n版本差异: 爱好从收集鸟蛋变成了收集火柴盒子。🤔 毕竟如果是珍惜鸟类，属于犯罪。", "chinese": "你想对我说什么吗？\n\n牙科医生们总是在你无法作出回答的时候向你提出问题。\n\n我的牙科医生刚刚给我拔掉了一颗牙，叫我休息一会儿。我想说点什么，但我嘴里塞满了药棉。\n\n他知道我收集火柴盒，于是问我收藏的米柴盒是否在增加。接着他又问我的兄弟近来如何，问我是否喜欢伦敦的新工作。作为对这些问题的回答，我不是点头，就是发出奇怪的声音。\n\n与此同时，我的舌头正在忙着寻找刚拔掉的那颗牙的伤口。我突然非常着急起来，但却什么也说不出来。当那位牙医最后将药棉从我嘴中取出时，我总算有可能告诉他，他拔错了牙。", "vocabulary": {"pull": "v. 拔", "cotton": "n. 药棉", "collect": "v. 搜集", "collection": "n. 收藏品，收集品", "nod": "v. 点头", "meanwhile": "adv. 同时"}}, {"id": 49, "title_en": "The end of a dream", "title_cn": "美梦告终", "english": "T\n\nired of sleeping on the floor, a young man in Teheran saved up for years to buy a real bed. For the first time in his life, he became the proud owner of a bed which had springs and a mattress. Because the weather was very hot, he carried the bed on to the roof of his house. He slept very well for the first two nights, but on the third night, a storm blew up. A gust of wind swept the bed off the roof and sent it crashing into the courtyard below. The young man did not wake up until the bed had struck the ground. Although the bed was smashed to pieces, the man was miraculously unhurt. When he woke up, he was still on the mattress. Glancing at the bits of wood and metal that lay around him, the man sadly picked up the mattress and carried it into his house. After he had put it on the floor, he promptly went to sleep again.", "chinese": "美梦告终\n\n德黑兰的一个人年轻人由于对睡地板感到厌倦，于是积蓄多年买了一张真正的床。他平生第一次自豪地拥有了一张既有弹簧又带床垫的床。\n\n由于天气很热，他便把床搬到了他的屋顶上。头两天晚上，他睡得非常好。但第三天晚上起了风暴。一阵大风把床从屋顶上刮了下来，把它摔碎在下面的院子里。\n\n那年轻人直到床撞到地上才醒了过来。尽管床摔成了碎片，但年轻人却奇迹地没有受伤。\n\n他醒来时，仍然躺在床垫上。年轻人看了一眼周围的碎木片和碎金属片，伤心地捡起了床垫，把它拿进了屋。他把床垫往地板上一放，很快又睡着了。", "vocabulary": {"tired": "adj. 厌烦的", "real": "adj. 真正的", "owner": "n. 主人", "spring": "n. 弹簧", "mattress": "n. 床垫", "gust": "n. 一阵风", "sweep": "v. 扫，刮", "courtyard": "n. 院子", "smash": "v. 碰碎，摔碎", "miraculously": "adv. 奇迹般地", "unhurt": "adj. 没有受伤的", "glance": "v. 扫视", "promptly": "adv. 迅速地"}}, {"id": 50, "title_en": "Taken for a ride", "title_cn": "乘车兜风", "english": "I\n\n love travelling in the country, but I don't like losing my way. I went on an excursion recently, but my trip took me longer than I expected.\n\n'I'm going to Woodford Green,' I said to the conductor as I got on the bus, 'but I don't know where it is.'\n\n'I'll tell you where to get off.' answered the conductor.\n\nI sat in the front of the bus to get a good view of the countryside. After some time, the bus stopped. Looking round, I realized with a shock that I was the only passenger left on the bus.\n\n'You'll have to get off here,' the conductor said. 'This is as far as we go.'\n\n'Is this Woodford Green?' I asked.\n\n'Oh dear,' said the conductor suddenly. 'I forgot to put you off.'\n\n'It doesn't matter,' I said. 'I'll get off here.'\n\n'We're going back now,' said the conductor.\n\n'Well, in that case, I prefer to stay on the bus,' I answered.", "chinese": "乘车兜风\n\n我喜欢在乡间旅行，但却不愿意迷路。最近我作了一次短途旅行，但这次旅行所花费的时间比我预计的要长。\n\n“我要去伍德福德草地，”我一上车就对售票员说，“但我不知道它在那儿。”\n\n“我来告诉您在哪儿下车，”售票员回答说。\n\n我坐在汽车的前部，以便饱览农村风光。过了一些时候，车停了。我环视了一下身旁，惊奇地发现车里就只剩我一个乘客了。\n\n“您得在这里下车，”售票员说，“我们的车就到此为止了。”\n\n“这里是伍德福德草地吗？”我问道。\n\n“哎呀，”售票员突然说，“我忘了让您下车了。”\n\n“没关系，”我说，“我就在这儿下吧。”\n\n“我们现在要返回去，”售票员说。\n\n“好吧，既然如此，我还是留在车上吧。”我回答说。", "vocabulary": {"ride": "n. 旅行", "excursion": "n. 远足", "conductor": "n. 售票员", "view": "n. 景色"}}, {"id": 51, "title_en": "Reward for virtue", "title_cn": "对美德的奖赏", "english": "M\n\ny friend, Herbert, has always been fat, but things got so bad recently that he decided to go on a diet. He began his diet a week ago. First of all, he wrote out a long list of all the foods which were forbidden. The list included most of the things Herbert loves: butter, potatoes, rice, beer, milk, chocolate, and sweets. Yesterday I paid him a visit. I rang the bell and was not surprised to see that Herbert was still as fat as ever. He led me into his room and hurriedly hid a large parcel under his desk. It was obvious that he was very embarrassed. When I asked him what he was doing, he smiled guiltily and then put the parcel on the desk. He explained that his diet was so strict that he had to reward himself occasionally. Then he showed me the contents of the parcel. It contained five large bars of chocolate and three bags of sweets!", "chinese": "对美德的奖赏\n\n我的朋友休一直很胖，但是近来情况变得越发糟糕，以致他决定节食。\n\n他是一星期前开始节食的。首先，他开列了一张长长的单子，上面列了所有禁吃的食物。这张单子上的大多数食物都是休喜欢吃的：黄油、土豆、米饭、啤酒、牛奶、巧克力和糖果。\n\n昨天我去看望了他。我按响了门铃，当看到休仍和往常一样胖时，我并不感到惊奇\n\n他把我领进屋，慌忙把一个大包藏到了桌子下面。显然他感到很尴尬。当我问他正干什么时，他内疚地笑了，然后把那个大包拿到了桌上。\n\n他解释说，他的饮食控制得太严格了，以致不得不偶尔奖赏自己一下。接着他给我看了包里的东西。里面装了5大块巧克力和3袋糖果！", "vocabulary": {"reward": "v. 给奖赏", "virtue": "n. 美德", "diet": "n. 节食", "forbid": "v. 禁止", "hurriedly": "adv. 匆忙地", "embarrass": "v. 使尴尬", "guiltily": "adv. 内疚地", "strict": "adj. 严格的", "occasionally": "adv. 偶尔地"}}, {"id": 52, "title_en": "A pretty carpet", "title_cn": "漂亮的地毯", "english": "W\n\ne have just moved into a new house and I have been working hard all morning. I have been trying to get my new room in order. This has not been easy because I own over a thousand books. To make matters worse, the room is rather small, so I have temporarily put my books on the floor. At the moment, they cover every inch of floor space and I actually have to walk on them to get in or out of the room. A short while ago, my sister helped me to carry one of my old bookcases up the stairs. She went into my room and got a big surprise when she saw all those books on the floor. 'This is the prettiest carpet I have ever seen,' she said. She gazed at it for some time then added, 'You don't need bookcases at all. You can sit here in your spare time and read the carpet!'", "chinese": "漂亮的地毯\n\n我们刚刚搬进一所新房子，我辛辛苦苦地干了整整一个上午。我试图把我的新房间收拾整齐，但这并不容易，因为我有1,000多本书。更糟糕的是房间还非常小，所以我暂时把书放在了地板上。这会儿，书把地板的每一点空隙都占据了，我实际上是踩着这些书进出房间的。\n\n几分钟前，我妹妹帮我把一个旧书橱抬上了楼。她走进我的房间，当她看到地板上的那些书时，大吃一惊。“这是我见过的最漂亮的地毯，”她说。她盯着“地毯”看了一会儿，又说：“你根本用不着书橱，空闲时你可以坐在这儿读地毯！”", "vocabulary": {"temporarily": "adv. 暂时地", "inch": "n. 英寸(度量单位)", "space": "n. 空间", "actually": "adv. 实际上"}}, {"id": 53, "title_en": "Hot snake", "title_cn": "触电的蛇", "english": "A\n\nt last firemen have put out a big forest fire in California. Since then, they have been trying to find out how the fire began. Forest fires are often caused by broken glass or by cigarette ends which people carelessly throw away. Yesterday the firemen examined the ground carefully, but were not able to find any broken glass. They were also quite sure that a cigarette end did not start the fire. This morning, however, a fireman accidentally discovered the cause. He noticed the remains of a snake which was wound round the electric wires of a 16,000-volt power line. In this way, he was able to solve the mystery. The explanation was simple but very unusual. A bird had snatched up the snake from the ground and then dropped it on to the wires. The snake then wound itself round the wires. When it did so, it sent sparks down to the ground and these immediately started a fire.", "chinese": "触电的蛇\n\n消防队员们终于扑灭了加利福尼亚的一场森林大火。从那时起，他们一直试图找出起火的原因。森林火灾时常由破碎的玻璃或人们随手扔掉的香烟头引起。\n\n昨天，消防队员仔细查看了地面，但未能发现碎玻璃。他们还十分肯定火灾也不是由烟头引起的。\n\n然而今天上午，一个消防队员偶然发现了起火的原因。他发现了缠绕在16,000伏高压线上的一条死蛇。就这样，他解开了起火之谜。\n\n解释很简单，却异乎寻常。一只鸟把蛇从地上抓起来，然后把它扔到了电线上。于是蛇就缠住了几根电线。当它这样做时，把火花送到了地面，这些火花立刻引起了一场大火。", "vocabulary": {"hot": "adj. 带电的，充电的", "fireman": "n. 消防队员", "cause": "n. 原因", "examine": "v. 检查", "accidentally": "adv. 意外地,偶然地", "remains": "n. 尸体，残骸", "wire": "n. 电线", "volt": "n. 伏特(电压单位) power line 英 美 n. 电力线", "solve": "v. 解决", "mystery": "n. 谜", "snatch": "v. 抓住", "spark": "n. 电火花"}}, {"id": 54, "title_en": "Sticky fingers", "title_cn": "粘糊的手指", "english": "A\n\nfter breakfast, I sent the children to school and then I went to shop. It was still early when I returned home. The children were at school, my husband was at work and the house was quiet. So I decided to make some meat pies. In a short time I was busy mixing butter and flour and my hands were soon covered with sticky pastry. At exactly that moment, the telephone rang. Nothing could have been more annoying. I picked up the receiver between two sticky fingers and was dismayed when I recognized the voice of Helen Bates. It took me ten minutes to persuade her to ring back later. At last I hung up the receiver. What a mess! There was pastry on my fingers, on the telephone, and on the doorknobs. I had no sooner got back to the kitchen than the doorbell rang loud enough to wake the dead. This time it was the postman and he wanted me to sign for a registered letter!\n\n版本差异: 相比旧版，market 被改成了 shop ; Mrs Bates 改成了Helen Bates。需要准备的小点心，也从tarts for tea 改成了meat pies", "chinese": "粘糊的手指\n\n早饭后，我送孩子们上学，然后就去了商店。我回到家时，时间还早。孩子们在上学，我丈夫在上班，家里清静得很。\n\n于是我决定做些肉馅饼。不一会儿我就忙着调拌起了黄油和面粉，很快我的手上就沾满了粘粘的面糊。恰恰在此时，电话铃响了。没有什么能比这更烦人了。\n\n我用两个沾满面糊的手指捏起了话筒。当听出是海伦·贝茨的声音时，非常丧气。我用了10分钟的时间才说服她过会儿再来电话。\n\n我终于挂上了话筒。真是糟糕透了！我的手指上、电话机上以及门的把手上，都沾上了面糊。我刚回到厨房，门铃又响了起来，响声足以把死人唤醒。这次是邮递员，他要我签收一封挂号信！", "vocabulary": {"sticky": "adj. 粘的", "finger": "n. 手指", "pie": "n. 馅饼", "mix": "v. 混合，拌和", "pastry": "n. 面糊", "annoying": "adj. 恼人的", "receiver": "n. 电话的话筒", "dismay": "v. 失望，泄气", "recognize": "v. 认出，听出", "persuade": "v. 说服，劝说", "mess": "n. 乱七八糟", "doorknob": "n. 门把手", "sign": "v. 签字", "register": "v. 挂号邮寄"}}, {"id": 55, "title_en": "Not a gold mine", "title_cn": "并非金矿", "english": "D\n\nreams of finding lost treasure almost came true recently. A new machine called 'The Revealer' has been invented and it has been used to detect gold which has been buried in the ground. The machine was used in a cave near the seashore where -- it is said -- pirates used to hide gold. The pirates would often bury gold in the cave and then fail to collect it. Armed with the new machine, a search party went into the cave hoping to find buried treasure. The leader of the party was examining the soil near the entrance to the cave when the machine showed that there was gold under the ground. Very excited, the party dug a hole two feet deep. They finally found a small gold coin which was almost worthless. The party then searched the whole cave thoroughly but did not find anything except an empty tin trunk. In spite of this, many people are confident that 'The Revealer' may reveal something of value fairly soon.", "chinese": "并非金矿\n\n最近，找到失踪宝藏的梦想差一点儿变成现实。一种叫“探宝器”的新机器已经发明出来，并被人们用来探测地下埋藏的金子。\n\n在靠近海边的一个据说过去海盗常在里面藏金子的岩洞里，这种机器被派上了用场。海盗们过去常把金子埋藏在那个洞里，可后来却没能取走。\n\n一支用这种新机器装备起来的探宝队进入了这个岩洞，希望找到埋藏着的金子。当这个队的队长正在检查洞口附近的土壤时，那台机器显示出它的下面埋有金子。\n\n队员们异常激动，就地挖了一个两英尺深的坑，但最后找到的是一枚几乎一钱不值的小金币。队员们接着又把整个洞彻底搜寻了一遍，但除了一只空铁皮箱外什么也没找到。尽管如此，很多人仍然相信“探宝器”很快就会探出值钱的东西来。", "vocabulary": {"gold": "n. 金子", "mine": "n. 矿", "treasure": "n. 财宝", "revealer": "n. 探测器", "invent": "v. 发明", "detect": "v. 探测", "bury": "v. 埋藏", "cave": "n. 山洞", "seashore": "n. 海岸", "pirate": "n. 海盗", "arm": "v. 武装", "soil": "n. 泥土", "entrance": "n. 入口", "finally": "adv. 最后", "worthless": "adj. 毫无价值的", "thoroughly": "adv. 彻底地", "trunk": "n. 行李箱", "confident": "adj. 有信心的", "value": "n. 价值"}}, {"id": 56, "title_en": "Faster than sound!", "title_cn": "比声音还快！", "english": "O\n\nnce a year a race is held for old cars. A lot of cars entered for this race last year and there was a great deal of excitement just before it began. One of the most handsome cars was a Rolls-Royce Silver Ghost. The most unusual car was a Benz which had only three wheels. Built in 1885, it was the oldest car taking part. After a great many loud explosions, the race began. Many of the cars broke down on the course and some drivers spent more time under their cars than in them! A few cars, however, completed the race. The winning car reached a speed of forty miles an hour -- much faster than any of its rivals. It sped downhill at the end of the race and its driver had a lot of trouble trying to stop it. The race gave everyone a great deal of pleasure. It was very different from modern car races but no less exciting.", "chinese": "比声音还快！\n\n旧式汽车的比赛每年举行一次。去年有很多汽车参加了这项比赛。比赛开始之前，人们异常激动。\n\n最漂亮的汽车之一是罗尔斯--罗伊斯生产的银色魅影（原译作银鬼汽车😅），而最不寻常的一辆则要属只有3只轮子的奔驰牌汽车了。该车造于1885年，是参赛车中最老的一辆。\n\n在好一阵喧闹的爆炸声之后，比赛开始了。很多汽车在途中就抛了锚，而有些驾驶员花在汽车底下的时间比坐在汽车里面的时间还长。然而还是有几辆汽车跑完了全程。\n\n获胜的那辆车达到了时速40英里--远远超过任何对手。它在接近终点时，冲下了山坡，驾驶员费了好大劲才把车停下来。\n\n这次比赛使每个人都挺开心。它虽然与现代汽车比赛大不相同，但激动人心的程度并不亚于现代化汽车大赛。", "vocabulary": {"sound": "n. 声音", "excitement": "n. 激动，兴奋", "handsome": "adj. 漂亮的，美观的 Rolls-Royce ['rəʊlz'rɔis] 英 美 n. 罗尔斯—罗伊斯 Benz 英 美 n. 奔驰", "wheel": "n. 轮子", "explosion": "n. 爆炸，轰响", "course": "n. 跑道；行程", "rival": "n. 对手", "speed": "v. 疾驶", "downhill": "adv. 下坡"}}, {"id": 57, "title_en": "Can I help you, madam?", "title_cn": "您要买什么，夫人？", "english": "A\n\n woman in jeans stood at the window of an expensive shop. Though she hesitated for a moment, she finally went in and asked to see a dress that was in the window. The assistant who served her did not like the way she was dressed. Glancing at her scornfully, he
